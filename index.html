<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="NCE Prep"/>
  <meta name="theme-color" content="#080d1a"/>
  <title>NCE Study Hub</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#080d1a;color:#e2e8f0;font-family:Georgia,serif;min-height:100vh;overscroll-behavior:none}
    button{font-family:inherit;cursor:pointer}
    .root{min-height:100vh;position:relative}
    .glow{position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(79,156,249,0.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(168,85,247,0.05) 0%,transparent 55%);pointer-events:none;z-index:0}
    .wrap{max-width:760px;margin:0 auto;padding:24px 16px 64px;position:relative;z-index:1}
    /* Header */
    .hdr{text-align:center;margin-bottom:28px;padding-top:12px}
    .chip{display:inline-block;background:rgba(79,156,249,0.12);border:1px solid rgba(79,156,249,0.25);color:#4f9cf9;font-size:10px;font-family:monospace;letter-spacing:0.2em;padding:4px 14px;border-radius:20px;margin-bottom:12px}
    .title{font-size:32px;font-weight:700;margin:0 0 8px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:#475569;font-size:13px;margin:0 0 16px;font-style:italic}
    .ovbar{display:inline-flex;align-items:center;gap:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 20px}
    .vdiv{width:1px;height:24px;background:rgba(255,255,255,0.08)}
    .stat-n{display:block;font-size:20px;font-weight:700;font-family:monospace;text-align:center}
    .stat-l{display:block;font-size:10px;color:#475569;font-family:monospace;letter-spacing:0.05em;text-align:center}
    /* Section */
    .sec-label{font-size:11px;font-family:monospace;color:#475569;letter-spacing:0.08em;margin-bottom:10px;margin-top:8px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:18px}
    /* Domain Card */
    .dcard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden;text-align:left;width:100%}
    .dcard-accent{height:3px;width:100%}
    .dcard-inner{padding:16px 16px 14px}
    .dcard-emoji{font-size:20px;display:block;margin-bottom:6px}
    .dcard-name{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:3px;line-height:1.35}
    .dcard-meta{font-size:11px;color:#475569;font-family:monospace;margin-bottom:10px}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
    .bar-pct{font-size:12px;font-family:monospace;font-weight:700;min-width:36px}
    .not-started{font-size:11px;color:#334155;font-family:monospace;margin-bottom:10px}
    .card-actions{display:flex;gap:8px;align-items:center}
    .study-btn{font-size:12px;font-family:monospace;font-weight:600;color:#fff;border:none;border-radius:8px;padding:6px 14px}
    .reset-btn{font-size:11px;font-family:monospace;color:#475569;background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px}
    /* Tracker */
    .tracker-wrap{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px 18px;margin-bottom:16px}
    .tracker-title{font-size:12px;font-family:monospace;color:#64748b;letter-spacing:0.06em;margin-bottom:14px}
    .tracker-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .tracker-emoji{font-size:16px;width:22px;text-align:center;flex-shrink:0}
    .tracker-info{flex:1;min-width:0}
    .tracker-name{font-size:11px;color:#94a3b8;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tracker-bar-row{display:flex;align-items:center;gap:6px}
    .tracker-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
    .tracker-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
    .tracker-pct{font-size:11px;font-family:monospace;font-weight:700;min-width:34px;text-align:right}
    .tracker-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .tracker-status{font-size:10px;font-family:monospace;font-weight:600}
    .tracker-count{font-size:10px;font-family:monospace;color:#334155}
    .tracker-summary{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
    .tracker-sum-label{font-size:11px;font-family:monospace;color:#64748b;min-width:46px}
    /* Legend / Footer */
    .legend{display:flex;justify-content:center;gap:16px;margin-top:6px;flex-wrap:wrap;margin-bottom:12px}
    .legend-item{font-size:11px;color:#475569;font-family:monospace}
    .footer{text-align:center;color:#1e293b;font-size:10px;margin-top:24px;font-family:monospace}
    /* Quiz top bar */
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
    .back-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:#94a3b8;font-size:12px;padding:6px 12px;border-radius:8px;font-family:monospace;white-space:nowrap}
    .domain-tag{font-size:12px;color:#94a3b8;flex:1;text-align:center;padding:0 8px}
    .session-tag{font-size:13px;font-family:monospace;color:#e2e8f0;background:rgba(255,255,255,0.05);padding:6px 12px;border-radius:8px;white-space:nowrap}
    /* Progress bar */
    .prog-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:4px;margin-bottom:18px;overflow:hidden}
    .prog-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
    /* Question card */
    .q-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:22px 18px}
    .q-label{font-size:10px;font-family:monospace;color:#334155;letter-spacing:0.12em;margin-bottom:10px}
    .q-text{font-size:15px;line-height:1.8;color:#e2e8f0;margin:0 0 18px}
    .options{display:flex;flex-direction:column;gap:8px}
    .opt-btn{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:10px;text-align:left;width:100%;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#cbd5e1}
    .opt-btn:disabled{cursor:default}
    .opt-letter{font-size:12px;font-family:monospace;font-weight:700;opacity:0.6;min-width:14px;margin-top:2px;flex-shrink:0}
    .opt-text{font-size:13px;line-height:1.6;flex:1;text-align:left}
    .opt-correct{background:rgba(34,197,94,0.12)!important;border-color:#22c55e!important;color:#4ade80!important}
    .opt-wrong{background:rgba(239,68,68,0.12)!important;border-color:#ef4444!important;color:#f87171!important}
    .opt-mark{margin-left:auto;padding-left:8px}
    /* Explanation */
    .exp-box{margin-top:14px;padding:14px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
    .exp-hdr{font-size:14px;font-weight:600;margin-bottom:8px}
    .exp-txt{font-size:13px;line-height:1.75;color:#94a3b8;margin:0 0 12px}
    .next-btn{border:none;color:#fff;font-size:13px;font-weight:600;padding:8px 18px;border-radius:8px;font-family:monospace}
    /* Session stats */
    .sess-stats{display:flex;justify-content:center;gap:28px;margin-top:14px;padding:12px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#475569;font-family:monospace;font-size:13px}
    .streak{color:#f59e0b}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
// QUESTION BANK — 40 per domain, NBCC/CACREP accurate
// ─────────────────────────────────────────────
const QUESTION_BANK = {
ethics:[
{id:"e1",question:"A client discloses during a session that they plan to harm a specific coworker next week. What is the counselor's MOST appropriate first action?",options:["A) Maintain confidentiality as the threat may not be credible","B) Warn the identifiable third party and notify appropriate authorities","C) Consult a supervisor before taking any action","D) Hospitalize the client immediately without further assessment"],correct:"B",explanation:"The Tarasoff duty to warn requires counselors to take reasonable steps to protect identifiable third parties from serious and imminent threats. Confidentiality yields to public safety."},
{id:"e2",question:"A counselor realizes mid-session that a new client is the ex-spouse of a close personal friend. What should the counselor do?",options:["A) Continue the session since no clinical harm has occurred yet","B) Disclose the conflict and refer the client to another counselor","C) Only disclose the relationship if the client directly asks","D) Consult with the friend before deciding how to proceed"],correct:"B",explanation:"This constitutes a dual relationship and conflict of interest. Ethical practice requires disclosure of the conflict and referral to protect the client's best interests and maintain clinical objectivity."},
{id:"e3",question:"Which of the following BEST describes informed consent in counseling?",options:["A) A one-time verbal agreement at the start of treatment","B) An ongoing process ensuring clients understand the nature, risks, and alternatives of treatment","C) A legal document signed before the first session only","D) Permission granted by a third-party payer for treatment to begin"],correct:"B",explanation:"Per ACA Code of Ethics A.2, informed consent is an ongoing process covering goals, techniques, risks, benefits, alternatives, confidentiality limits, and the right to withdraw — not a one-time event."},
{id:"e4",question:"A counselor receives a subpoena for a client's therapy records. What is the MOST appropriate response?",options:["A) Immediately release all records to comply with the legal order","B) Consult with an attorney and notify the client before releasing records","C) Refuse all release requests as therapy records are always privileged","D) Release only session dates and not clinical notes"],correct:"B",explanation:"A subpoena is a legal request, not a court order compelling release. The counselor should consult legal counsel and notify the client, who may choose to waive or invoke privilege through their attorney."},
{id:"e5",question:"When is it ethically appropriate for a counselor to break confidentiality WITHOUT client consent?",options:["A) When a parent requests information about an adult child in treatment","B) When a client is in a custody dispute and no court order exists","C) When a client poses a serious and imminent threat to themselves or others","D) When an insurance company requests full session notes for billing"],correct:"C",explanation:"ACA ethics permit breaking confidentiality without consent when there is imminent danger to self or others, suspected child/elder abuse, or a valid court order."},
{id:"e6",question:"Which ethical principle refers to a counselor's obligation to act in the client's best interest?",options:["A) Autonomy","B) Nonmaleficence","C) Beneficence","D) Fidelity"],correct:"C",explanation:"Beneficence means actively promoting client well-being. Autonomy respects self-determination. Nonmaleficence means 'do no harm.' Fidelity refers to keeping promises and being trustworthy."},
{id:"e7",question:"A school counselor suspects a 14-year-old student is being physically abused at home. The student begs the counselor not to tell anyone. What should the counselor do?",options:["A) Honor the student's request to maintain the therapeutic relationship","B) Tell the student's parents about the suspected abuse","C) Report the suspected abuse to child protective services","D) Wait to see if the student discloses more in future sessions"],correct:"C",explanation:"Counselors are mandated reporters in all 50 states. Reasonable suspicion of child abuse must be reported to CPS regardless of the client's wishes. The standard is reasonable suspicion, not confirmed proof."},
{id:"e8",question:"A counselor begins developing romantic feelings for a current client. What is the MOST ethical course of action?",options:["A) Wait until the client terminates treatment before pursuing a relationship","B) Disclose the feelings to the client to maintain transparency","C) Seek supervision or personal therapy and consider referral if objectivity is compromised","D) Continue treatment as long as the feelings are not acted upon"],correct:"C",explanation:"ACA Code A.5 prohibits sexual or romantic relationships with current clients. The counselor must seek supervision and refer if clinical objectivity is compromised. Disclosure to the client is contraindicated."},
{id:"e9",question:"A counselor is seeing a client who reveals they are having an affair. The counselor has a strong moral objection to infidelity. The MOST ethical response is to:",options:["A) Refer the client to another counselor immediately","B) Tell the client the counselor's personal values to be transparent","C) Continue providing services while managing personal reactions through supervision","D) Avoid discussing the affair in future sessions"],correct:"C",explanation:"ACA Code A.11.b states counselors should not refer based on personal values unless continuing impairs the counseling relationship. The counselor should manage reactions through supervision."},
{id:"e10",question:"Under HIPAA, within how many days must a covered entity respond to a client's request to access their own records?",options:["A) 10 business days","B) 30 days (with possible 30-day extension for good cause)","C) 60 days","D) 90 days"],correct:"B",explanation:"HIPAA's Privacy Rule (45 CFR §164.524) requires a response within 30 days. A one-time 30-day extension is permitted with written notice to the client."},
{id:"e11",question:"A counselor terminates services because they are moving out of state. Which action BEST ensures ethical termination?",options:["A) Ending sessions abruptly to avoid fostering further dependency","B) Providing referrals and a treatment summary to support continuity of care","C) Allowing the client to determine when termination is complete","D) Automatically transferring all records to the new provider"],correct:"B",explanation:"ACA Code A.11 requires adequate pre-termination counseling, referrals, and support for continuity of care. Records cannot be automatically transferred without written client authorization per HIPAA."},
{id:"e12",question:"A counselor in private practice wants to post client success stories on their website. What must they do FIRST?",options:["A) Change identifying details so clients cannot be recognized","B) Obtain written informed consent from each client whose story is used","C) Only post stories from clients who have been discharged for at least one year","D) Get verbal permission during a session and document it in the chart"],correct:"B",explanation:"ACA Code H.6 requires explicit written consent for use of client information for promotional purposes. Altering details alone does not substitute for consent."},
{id:"e13",question:"A client who was recently hospitalized against their will asks their outpatient counselor what their rights are. Which statement is MOST accurate?",options:["A) Hospitalized clients lose all rights to refuse treatment","B) Involuntary clients retain rights including the right to treatment in the least restrictive environment","C) The hospital holds all decision-making authority once admission occurs","D) Rights are suspended until a psychiatrist clears the client for discharge"],correct:"B",explanation:"Even involuntarily committed clients retain rights under law, including the right to treatment in the least restrictive environment, the right to refuse specific treatments (with some limits), and the right to legal counsel."},
{id:"e14",question:"A counselor discovers a colleague is practicing while impaired by alcohol. According to the ACA Code of Ethics, what should the counselor do FIRST?",options:["A) Report the colleague immediately to the state licensing board","B) Attempt to address the concern informally with the colleague directly","C) Ignore it since it is not the counselor's professional responsibility","D) Notify the colleague's clients that they may want to seek other services"],correct:"B",explanation:"ACA Code H.2 advises counselors to first attempt to address concerns informally with the colleague. If that fails, they should report through appropriate channels. Immediate board reporting skips the informal step."},
{id:"e15",question:"Which of the following BEST describes the ethical concept of nonmaleficence?",options:["A) Promoting the client's growth and welfare","B) Treating all clients fairly and equitably","C) Avoiding actions that cause harm to clients","D) Honoring commitments and keeping promises"],correct:"C",explanation:"Nonmaleficence means 'first, do no harm.' It obligates counselors to avoid practices that are harmful, ineffective, or exploitative."},
{id:"e16",question:"A minor client discloses marijuana use to a school counselor. What factor is MOST important in determining whether to notify parents?",options:["A) The frequency of use","B) State law and school policy governing minor confidentiality","C) The counselor's personal values about drug use","D) Whether the student has a 504 plan"],correct:"B",explanation:"Minor confidentiality varies significantly by state law and school policy. The counselor must be guided by applicable statutes and policies, not personal values."},
{id:"e17",question:"A client requests that their counselor release records to a life insurance company. The counselor should:",options:["A) Release records immediately to comply with the client's wishes","B) Release records only after obtaining written authorization from the client","C) Refuse because insurance companies are not legitimate requestors","D) Consult a supervisor before taking any action"],correct:"B",explanation:"Release of records to any third party requires written client authorization per HIPAA. The client's verbal request is insufficient."},
{id:"e18",question:"A licensed counselor in private practice wants to barter services with a client who cannot afford fees. The ACA Code of Ethics:",options:["A) Prohibits all bartering as inherently exploitative","B) Permits bartering only if it is not clinically contraindicated and the client requests it","C) Requires peer consultation before any bartering arrangement","D) Allows bartering only as a last resort"],correct:"B",explanation:"ACA Code A.10.e permits bartering if it is not exploitative, if there is no inherent conflict, and if the client initiates the request."},
{id:"e19",question:"A client tells their counselor they are HIV positive and are engaging in unprotected sex with a partner who does not know their status. The counselor is ethically permitted to:",options:["A) Report to public health authorities without hesitation","B) Break confidentiality only if the jurisdiction permits disclosure to protect third parties and other conditions are met","C) Tell the partner directly on the client's behalf","D) Terminate treatment since the client is engaging in illegal behavior"],correct:"B",explanation:"HIV disclosure law varies by state. ACA Code B.2.b permits disclosure to protect third parties only when allowed by law, the client has been warned, and persuasion to self-disclose has failed. This is permissive, not mandatory."},
{id:"e20",question:"Which of the following represents a violation of ACA's standard on record keeping?",options:["A) Keeping records for the minimum period required by state law","B) Destroying records in a way that protects client confidentiality","C) Releasing records to a collection agency without client consent to recover unpaid fees","D) Storing electronic records using password-protected encryption"],correct:"C",explanation:"Releasing client records to a collection agency without written authorization violates confidentiality. Counselors cannot use records as leverage for fee collection without client consent."},
{id:"e21",question:"A counselor who provides telehealth services across state lines MUST be aware that:",options:["A) Federal law supersedes state licensure requirements for telehealth","B) Counselors must generally be licensed in the state where the client is physically located","C) HIPAA alone is sufficient to authorize interstate practice","D) Any licensed counselor can provide telehealth in any state"],correct:"B",explanation:"Licensure is regulated at the state level. Most states require the provider to be licensed in the state where the client is physically located at the time of service."},
{id:"e22",question:"Which of the following is TRUE regarding group counseling and confidentiality?",options:["A) Confidentiality in groups is protected by the same legal privilege as individual therapy","B) Counselors can guarantee confidentiality of all group disclosures","C) Counselors cannot guarantee that members will maintain confidentiality outside the group","D) Members are legally obligated to keep group information confidential"],correct:"C",explanation:"The counselor can commit to their own confidentiality but cannot legally guarantee other group members' behavior. This limitation must be disclosed during informed consent."},
{id:"e23",question:"A client who is a nurse discloses that she has been diverting medications from her workplace. The counselor's ethical obligation MOST directly involves:",options:["A) Reporting to the state nursing board immediately","B) Exploring the behavior therapeutically while assessing any risk to patients","C) Warning the hospital administration","D) Terminating treatment since the client is engaged in illegal activity"],correct:"B",explanation:"There is no mandatory reporting requirement for drug diversion unless identifiable third parties are at imminent risk. The counselor should explore the behavior and assess patient safety."},
{id:"e24",question:"The primary ethical purpose of clinical supervision is:",options:["A) To ensure the supervisee does not make any clinical errors","B) To protect the welfare of clients served by the supervisee","C) To fulfill administrative documentation requirements","D) To evaluate the supervisee's eligibility for licensure"],correct:"B",explanation:"The primary purpose of clinical supervision is client welfare. The supervisor is ethically responsible for the clients seen by supervisees."},
{id:"e25",question:"A counselor is asked to provide an expert opinion in a custody case involving a current client. The counselor should:",options:["A) Accept the role since they know the client well","B) Decline the dual role of treating clinician and forensic evaluator for the same client","C) Provide the opinion only if both parents consent","D) Limit the testimony to behavioral observations from sessions"],correct:"B",explanation:"ACA Code and forensic ethics standards prohibit treating clinicians from serving as forensic evaluators for the same client due to the inherent role conflict."},
{id:"e26",question:"Which of the following BEST describes justice as an ethical principle in counseling?",options:["A) Acting in the client's best interest at all times","B) Providing fair and equitable treatment to all clients, including those from marginalized groups","C) Avoiding harm in all clinical actions","D) Maintaining honesty in the therapeutic relationship"],correct:"B",explanation:"Justice in counseling ethics refers to fairness, equitable access, and nondiscrimination. It obligates counselors to provide the same quality of care regardless of race, gender, disability, or socioeconomic status."},
{id:"e27",question:"A counselor who works with a client referred by an EAP must understand that:",options:["A) The employer may access session content if they are paying for the services","B) EAP counseling is subject to the same confidentiality standards as any other counseling","C) EAP clients waive confidentiality by accepting employer-provided services","D) The number of sessions used can be reported to the employer without authorization"],correct:"B",explanation:"EAP counseling is governed by the same confidentiality protections as other counseling. Employers may receive aggregate data but cannot access individual records without written authorization."},
{id:"e28",question:"A counselor's client mentions that a former therapist had a sexual relationship with them during treatment. The counselor's MOST appropriate response is:",options:["A) Encourage the client to pursue legal action against the former therapist","B) Validate the client's experience, provide psychoeducation, and document the disclosure","C) Report the former therapist to the licensing board on the client's behalf","D) Avoid exploring the topic to prevent retraumatization"],correct:"B",explanation:"The counselor should validate the client, psychoeducate about boundary violations, and document. The counselor cannot file a board complaint on the client's behalf — that right belongs to the client."},
{id:"e29",question:"A counselor is completing a court-ordered evaluation and discovers information that would harm the client's legal case. The counselor should:",options:["A) Omit damaging information from the report to protect the client","B) Report all clinically relevant findings accurately and objectively","C) Inform the client's attorney before submitting the report","D) Refuse to complete the evaluation"],correct:"B",explanation:"In forensic contexts, the counselor's primary obligation is accuracy and objectivity to the court, not advocacy for the client. Omitting relevant information constitutes a breach of professional integrity."},
{id:"e30",question:"Which of the following is an example of a boundary crossing (as opposed to a boundary violation)?",options:["A) Entering a sexual relationship with a former client after two years","B) Accepting a small gift from a client at the conclusion of a successful treatment","C) Sharing extensive personal information with a client throughout treatment","D) Treating a family member in exchange for financial compensation"],correct:"B",explanation:"A boundary crossing is a deviation from standard practice that may be clinically justified and does not inherently harm the client. A boundary violation causes or risks harm."},
{id:"e31",question:"A supervisee discloses to their supervisor that they lied on their internship application about their clinical hours. The supervisor's FIRST obligation is:",options:["A) Report the falsification to the training program immediately","B) Explore the supervisee's reasoning and discuss the ethical implications","C) Terminate the supervisory relationship","D) Ignore it since the supervisee has already been accepted"],correct:"B",explanation:"The supervisor should first address the issue directly with the supervisee, exploring the behavior and its implications. Immediate termination or reporting without exploration is premature."},
{id:"e32",question:"Which of the following statements about the ACA's ethics complaint process is TRUE?",options:["A) The ACA can revoke a counselor's state license","B) The ACA ethics process is separate from state licensure board proceedings","C) Filing an ACA complaint automatically triggers a state board investigation","D) ACA complaints must be filed within 30 days of the alleged violation"],correct:"B",explanation:"The ACA ethics process (membership sanctions) is entirely separate from state licensing board proceedings. The ACA cannot revoke a state license. The two processes may run simultaneously but are independent."},
{id:"e33",question:"Under the ACA Code of Ethics, a counselor who disagrees with an agency's policy that they believe harms clients should FIRST:",options:["A) Resign from the agency immediately","B) Work to change the policy through legitimate institutional channels","C) Disregard the policy in the client's best interest","D) Report the agency to the state licensing board"],correct:"B",explanation:"ACA Code D.1.h directs counselors to attempt to change harmful policies through legitimate means rather than unilateral policy violation or immediate resignation."},
{id:"e34",question:"A counselor discovers that a client has been searching for the counselor's home address online. The counselor's FIRST step should be:",options:["A) Immediately terminate the therapeutic relationship","B) Address the behavior directly in session and assess for safety concerns","C) File a restraining order","D) Consult with law enforcement without informing the client"],correct:"B",explanation:"The behavior warrants direct clinical discussion and safety assessment. Immediate termination without discussion is premature."},
{id:"e35",question:"A counselor working in a community mental health center is pressured by administration to see 40 clients per week. The counselor believes this caseload compromises care quality. Ethically, the counselor should:",options:["A) Comply since administrators have authority over clinical decisions","B) Advocate for reduced caseloads through appropriate channels while maintaining professional standards","C) Quit immediately to avoid complicity","D) See fewer clients without informing the administration"],correct:"B",explanation:"ACA Code D.1.g requires counselors to advocate for work conditions that allow for ethical service delivery."},
{id:"e36",question:"Which of the following is TRUE regarding the use of social media with clients?",options:["A) Connecting with clients on social media is acceptable if they request it","B) Counselors should develop clear social media policies and discuss them during informed consent","C) Viewing a client's public social media is always a boundary violation","D) Social media contact is permissible after termination with appropriate documentation"],correct:"B",explanation:"ACA Code H.6 addresses technology. Counselors should establish social media policies and address them in informed consent. Friending current clients is generally discouraged."},
{id:"e37",question:"A client in treatment for depression discloses they own a firearm and have been having passive suicidal thoughts. No specific plan exists. The counselor's MOST appropriate action is:",options:["A) Immediately hospitalize the client","B) Conduct a thorough risk assessment and collaboratively develop a safety plan, which may include means restriction","C) Take no action since there is no specific plan","D) Notify law enforcement to confiscate the firearm"],correct:"B",explanation:"Passive ideation without plan warrants thorough risk assessment and collaborative safety planning. Means restriction counseling is an evidence-based component. Hospitalization is reserved for imminent risk."},
{id:"e38",question:"Which of the following is the MOST ethically problematic aspect of accepting clients outside one's scope of competence?",options:["A) It may result in lower session fees","B) It violates the principle of nonmaleficence by exposing clients to potential harm","C) It increases the counselor's administrative burden","D) It violates informed consent because the client does not know about the limitation"],correct:"B",explanation:"Practicing outside scope of competence violates nonmaleficence most directly — the client may receive inadequate or harmful treatment."},
{id:"e39",question:"A counselor is working with a transgender client and has no training in gender-affirming care. The MOST ethical course of action is:",options:["A) Refuse to see the client and refer immediately","B) Seek supervision and consultation, pursue training, and refer if competence cannot be developed","C) Treat the client using generic counseling approaches without specialized knowledge","D) Ask the client to educate the counselor about transgender issues during sessions"],correct:"B",explanation:"ACA Code C.2 requires counselors to practice within their competence. The ethical path is to seek supervision, training, and consultation before referring."},
{id:"e40",question:"A counselor working with a suicidal client decides not to hospitalize them based on clinical judgment. The client later attempts suicide. Which factor MOST protects the counselor from liability?",options:["A) The counselor had a signed no-suicide contract with the client","B) The counselor conducted and documented a thorough risk assessment and sound clinical rationale","C) The counselor notified the client's family","D) The counselor had the client sign a consent form for outpatient treatment"],correct:"B",explanation:"The standard of care in suicide risk management is a thorough, documented risk assessment with clear clinical rationale. No-suicide contracts have no proven efficacy and do not provide liability protection."},
],
helping:[
{id:"h1",question:"A client says 'I just feel like nothing ever goes right for me.' Using a person-centered approach, the counselor BEST responds:",options:["A) 'Have you considered that your thinking may be distorted?'","B) 'It sounds like you are feeling defeated and like success is out of reach for you.'","C) 'Let us make a list of things that have gone right this week.'","D) 'Why do you think nothing goes right for you?'"],correct:"B",explanation:"Empathic reflection mirrors emotional content to convey understanding without challenging or redirecting, consistent with person-centered principles developed by Carl Rogers."},
{id:"h2",question:"Which of the following is an example of a CLOSED-ended question?",options:["A) 'How did that make you feel?'","B) 'What thoughts came up for you during that moment?'","C) 'Did you feel angry when that happened?'","D) 'Tell me more about what that experience was like.'"],correct:"C",explanation:"Closed-ended questions can be answered with yes or no, limiting exploration. Open-ended questions invite elaboration and are preferred in most therapeutic contexts."},
{id:"h3",question:"A counselor reflects back the emotional content of what a client said without repeating the exact words. This is called:",options:["A) Paraphrasing","B) Summarizing","C) Reflection of feeling","D) Clarification"],correct:"C",explanation:"Reflection of feeling mirrors the affective component. Paraphrasing reflects content. Summarizing synthesizes multiple themes. Clarification checks understanding of ambiguous statements."},
{id:"h4",question:"In CBT, which technique involves testing the accuracy of negative automatic thoughts through real-world experiments?",options:["A) Free association","B) Behavioral activation","C) Behavioral experiments","D) Systematic desensitization"],correct:"C",explanation:"Behavioral experiments allow clients to test cognitions against reality. Free association is psychoanalytic. Behavioral activation targets anhedonia. Systematic desensitization treats phobias."},
{id:"h5",question:"Solution-Focused Brief Therapy (SFBT) is BEST characterized by:",options:["A) Exploring root causes through analysis of past trauma","B) Focusing on client strengths and building on exceptions to the problem","C) Using systematic desensitization to reduce anxiety","D) Challenging irrational beliefs through Socratic questioning"],correct:"B",explanation:"SFBT focuses on solutions rather than problems, leveraging strengths and identifying exceptions — times when the problem does not occur or is less severe. Developed by de Shazer and Berg."},
{id:"h6",question:"A client in the contemplation stage of the Transtheoretical Model is BEST described as:",options:["A) Unaware that a problem exists","B) Aware of a problem and thinking about changing but not yet committed","C) Actively taking steps to modify behavior","D) Maintaining changes made over the past 6 months"],correct:"B",explanation:"Contemplation = awareness plus ambivalence. The person recognizes a problem and considers change but has not yet committed to action."},
{id:"h7",question:"The Miracle Question is a technique associated with which therapeutic approach?",options:["A) Psychoanalytic therapy","B) Gestalt therapy","C) Solution-Focused Brief Therapy","D) Rational Emotive Behavior Therapy"],correct:"C",explanation:"The Miracle Question is a hallmark SFBT technique developed by Steve de Shazer and Insoo Kim Berg to help clients envision life without the problem."},
{id:"h8",question:"A counselor tells a grieving client: 'It sounds like you are carrying a lot of guilt along with your sadness.' This is an example of:",options:["A) Interpretation","B) Confrontation","C) Advanced empathy","D) Reframing"],correct:"C",explanation:"Advanced (additive) empathy goes beyond what the client explicitly stated to reflect deeper underlying themes, helping clients access unexplored aspects of their experience."},
{id:"h9",question:"A counselor notices a client consistently redirects conversation away from their relationship with their father. This is BEST described as:",options:["A) Resistance","B) Transference","C) Countertransference","D) Projection"],correct:"A",explanation:"Resistance refers to behaviors that prevent therapeutic progress, often unconsciously protecting the client from painful material."},
{id:"h10",question:"Which BEST describes the counselor's role during the WORKING stage of the counseling relationship?",options:["A) Establishing rapport and clarifying client expectations","B) Facilitating deeper exploration and movement toward client goals","C) Reviewing progress and preparing for termination","D) Conducting formal intake and diagnostic assessment"],correct:"B",explanation:"The working stage involves active exploration, goal pursuit, and application of therapeutic interventions."},
{id:"h11",question:"A counselor is working with a client experiencing a psychiatric crisis. What is the PRIORITY intervention?",options:["A) Explore the childhood origins of the crisis","B) Ensure the client's immediate safety and stabilize the situation","C) Administer a formal diagnostic assessment","D) Contact the client's family for collateral information"],correct:"B",explanation:"In crisis intervention, safety and stabilization always take priority before any other clinical goal."},
{id:"h12",question:"Which therapeutic approach emphasizes present awareness and uses techniques like the empty chair?",options:["A) Adlerian therapy","B) Gestalt therapy","C) Rational Emotive Behavior Therapy","D) Narrative therapy"],correct:"B",explanation:"Gestalt therapy (Fritz Perls) focuses on present-moment awareness and unfinished business. The empty chair technique allows clients to address absent persons or disowned parts of themselves."},
{id:"h13",question:"Which of the following BEST describes the Adlerian concept of social interest?",options:["A) A client's need for social media validation","B) An individual's sense of belonging and contribution to the community","C) The counselor's interest in the client's social relationships","D) Peer pressure as a motivator for behavior change"],correct:"B",explanation:"Adler's Gemeinschaftsgefühl (social interest) is the measure of psychological health — identification with humanity and willingness to contribute to the common good."},
{id:"h14",question:"A counselor uses self-disclosure therapeutically by sharing a brief personal reaction. The PRIMARY purpose is:",options:["A) To build a personal friendship with the client","B) To model vulnerability and increase the client's sense of being understood","C) To demonstrate the counselor's superior coping abilities","D) To shift focus from the client's difficult emotions"],correct:"B",explanation:"Therapeutic self-disclosure is brief, purposeful, and client-focused. Extensive or need-driven disclosure is counter-therapeutic."},
{id:"h15",question:"In Motivational Interviewing, OARS stands for:",options:["A) Observe, Affirm, Reflect, Summarize","B) Open questions, Affirm, Reflect, Summarize","C) Open questions, Assess, Reinforce, Strategize","D) Orient, Affirm, Repeat, Summarize"],correct:"B",explanation:"OARS: Open questions (evoke exploration), Affirmations (recognize strengths), Reflections (demonstrate understanding), Summaries (collect and link what has been said)."},
{id:"h16",question:"Which of the following BEST describes the role of unconditional positive regard in person-centered therapy?",options:["A) Praising the client for positive behavioral changes","B) Accepting the client fully without judgment, regardless of their behavior or statements","C) Agreeing with the client's perspective on all issues","D) Avoiding confrontation to maintain a positive therapeutic relationship"],correct:"B",explanation:"Unconditional positive regard (Rogers) means prizing the client as a person regardless of what they say or do. The acceptance is not contingent on behavior."},
{id:"h17",question:"A client repeatedly arrives late, forgets homework, and changes the subject when progress is discussed. From a psychodynamic perspective, this is BEST understood as:",options:["A) Incompetence","B) Resistance","C) Negative transference","D) Therapeutic rupture"],correct:"B",explanation:"In psychodynamic theory, resistance refers to unconscious defenses that impede the therapeutic process. Lateness, forgetting, and avoidance are classic manifestations."},
{id:"h18",question:"Which of the following is a hallmark technique of Narrative Therapy?",options:["A) Systematic desensitization","B) The miracle question","C) Externalization of the problem","D) The ABC model"],correct:"C",explanation:"Narrative therapy (White & Epston) uses externalization to separate the person from the problem (e.g., 'The Depression' rather than 'I am depressed'), reducing shame and opening space for alternative stories."},
{id:"h19",question:"A counselor working from an Existential framework would MOST likely focus on:",options:["A) Restructuring the client's cognitive distortions","B) The client's freedom, responsibility, and search for meaning","C) Modifying reinforcement contingencies in the client's environment","D) Identifying and reparenting the client's inner child"],correct:"B",explanation:"Existential therapy (Yalom, Frankl, May) centers on the givens of existence: death, freedom, isolation, and meaninglessness, helping clients take responsibility for their choices."},
{id:"h20",question:"Which of the following describes Ellis's ABC model in REBT?",options:["A) A=Affect, B=Behavior, C=Consequence","B) A=Activating event, B=Belief, C=Consequence","C) A=Anxiety, B=Behavior, C=Coping","D) A=Assessment, B=Belief change, C=Consolidation"],correct:"B",explanation:"In REBT, A (Activating event) triggers B (Belief, rational or irrational), which produces C (emotional or behavioral Consequence). The counselor disputes irrational beliefs at B."},
{id:"h21",question:"A client who was abused as a child begins treating their counselor as though the counselor is their abusive parent — becoming defiant and mistrustful. This is BEST described as:",options:["A) Resistance","B) Countertransference","C) Transference","D) Projection"],correct:"C",explanation:"Transference is the displacement of feelings, expectations, or relational patterns from past significant relationships onto the counselor."},
{id:"h22",question:"In DBT, which skill set helps clients tolerate painful emotions without making the situation worse?",options:["A) Interpersonal effectiveness","B) Emotion regulation","C) Distress tolerance","D) Mindfulness"],correct:"C",explanation:"Distress tolerance skills help clients survive crises without destructive behaviors. Emotion regulation targets changing emotions. Interpersonal effectiveness addresses relationship skills."},
{id:"h23",question:"Which of the following is an example of a primary reinforcer?",options:["A) Money","B) Praise","C) Food when hungry","D) Good grades"],correct:"C",explanation:"Primary reinforcers satisfy biological needs and are innately rewarding. Secondary reinforcers (money, praise, grades) acquire value through association with primary reinforcers."},
{id:"h24",question:"Which technique involves the counselor helping a client identify automatic thoughts by asking 'What was going through your mind just then?'",options:["A) Socratic questioning","B) Thought records","C) Cognitive restructuring","D) In-session affect bridging"],correct:"A",explanation:"Socratic questioning in CBT uses guided discovery to help clients identify, examine, and evaluate their automatic thoughts and core beliefs."},
{id:"h25",question:"A counselor who maintains a warm but professional demeanor and consistently applies ethical boundaries is demonstrating:",options:["A) Countertransference management","B) Therapeutic use of self","C) Professional distance","D) Appropriate role boundaries"],correct:"B",explanation:"Therapeutic use of self refers to the intentional use of the counselor's personality, presence, and relational style as a healing tool."},
{id:"h26",question:"Which stage of Prochaska's Transtheoretical Model involves a person who has recently made a change and is working to prevent relapse?",options:["A) Contemplation","B) Preparation","C) Action","D) Maintenance"],correct:"D",explanation:"Maintenance (6+ months of sustained change) involves consolidating gains and preventing relapse. Action involves active behavioral change (0-6 months)."},
{id:"h27",question:"A client who experienced a traumatic event reports emotional numbing, hypervigilance, and nightmares for the past 4 weeks. Which diagnosis should FIRST be considered?",options:["A) PTSD","B) Adjustment Disorder","C) Acute Stress Disorder","D) Generalized Anxiety Disorder"],correct:"C",explanation:"Acute Stress Disorder presents with trauma symptoms within 3 days to 4 weeks of a traumatic event. PTSD is diagnosed when symptoms persist beyond 1 month."},
{id:"h28",question:"Which of the following BEST describes the technique of immediacy?",options:["A) Providing rapid feedback after each client statement","B) Addressing what is happening between counselor and client in the present moment","C) Interrupting the client when they go off topic","D) Offering interpretations based on immediate observations"],correct:"B",explanation:"Immediacy involves the counselor addressing the here-and-now dynamics of the therapeutic relationship itself. It is a relational skill requiring clinical judgment."},
{id:"h29",question:"A counselor using Motivational Interviewing encounters a client who says 'I know I drink too much, but I'm not ready to quit yet.' The MOST MI-consistent response is:",options:["A) 'I understand — what would it take for you to be ready?'","B) 'The health risks are serious and you need to stop soon.'","C) 'Let's schedule you for a detox program.'","D) 'You seem ambivalent — are you sure you want to be here?'"],correct:"A",explanation:"MI follows the spirit of partnership, acceptance, compassion, and evocation. Rolling with resistance and exploring ambivalence rather than confronting is central to MI."},
{id:"h30",question:"A counselor feels unusually sad after sessions with a particular client who is grieving. They should recognize this as:",options:["A) A sign the counselor is not cut out for grief work","B) Compassion fatigue requiring immediate leave of absence","C) Countertransference to be addressed in supervision","D) A normal response requiring no clinical attention"],correct:"C",explanation:"Countertransference includes the counselor's emotional reactions to clients. Feeling pulled into a client's emotional state is informative but requires supervision to prevent distortion of clinical judgment."},
{id:"h31",question:"Which of the following BEST distinguishes empathy from sympathy?",options:["A) Empathy involves feeling sorry for the client; sympathy involves understanding their perspective","B) Empathy involves understanding the client's experience from their frame of reference; sympathy involves feeling pity","C) There is no clinically meaningful distinction between the two","D) Sympathy is therapeutic; empathy is not"],correct:"B",explanation:"Empathy involves entering the client's subjective world from their frame of reference. Sympathy involves feeling for someone from the outside. Empathy is therapeutic; sympathy can create unhelpful power dynamics."},
{id:"h32",question:"According to Carl Rogers, which three core conditions are NECESSARY AND SUFFICIENT for therapeutic change?",options:["A) Insight, catharsis, and behavioral change","B) Unconditional positive regard, empathy, and congruence","C) Trust, boundaries, and consistency","D) Warmth, structure, and directiveness"],correct:"B",explanation:"Rogers proposed that the necessary and sufficient conditions for change are congruence (genuineness), unconditional positive regard (acceptance), and accurate empathic understanding."},
{id:"h33",question:"A counselor who consistently challenges a client's avoidance without adequate rapport has violated which therapeutic principle?",options:["A) Unconditional positive regard","B) Appropriate timing of interventions","C) Informed consent","D) Cultural competence"],correct:"B",explanation:"Clinical interventions, especially confrontational ones, require sufficient therapeutic alliance. Premature confrontation without adequate rapport can rupture the relationship and increase client defensiveness."},
{id:"h34",question:"Which of the following is TRUE about the use of silence in counseling?",options:["A) Silence always indicates resistance and should be broken by the counselor","B) Silence can be therapeutic and provide space for client reflection","C) Silence is inappropriate in active listening models","D) Silence should always be filled with reflections or questions"],correct:"B",explanation:"Therapeutic silence is a powerful tool that allows space for processing and reflection. Learning to tolerate silence is a key counselor skill."},
{id:"h35",question:"Which of the following BEST describes the behavioral technique of shaping?",options:["A) Punishing undesired behavior to eliminate it","B) Reinforcing successive approximations of a target behavior","C) Pairing an aversive stimulus with an undesired behavior","D) Withdrawing reinforcement to extinguish behavior"],correct:"B",explanation:"Shaping involves reinforcing behaviors that progressively approximate the desired target behavior, teaching complex behaviors step by step."},
{id:"h36",question:"A client with OCD is helped to refrain from checking behaviors while remaining in contact with anxiety-provoking stimuli. This describes:",options:["A) Flooding","B) Systematic desensitization","C) Exposure and Response Prevention (ERP)","D) Aversion therapy"],correct:"C",explanation:"ERP is the gold-standard behavioral treatment for OCD. Clients are exposed to feared stimuli while refraining from compulsive rituals, allowing anxiety to habituate naturally."},
{id:"h37",question:"Which of the following BEST describes psychological reactance in counseling?",options:["A) A client's tendency to agree with the counselor's suggestions","B) A client's resistance when they perceive their autonomy is being threatened","C) A counselor's emotional reaction to a difficult client","D) A client's reluctance to engage in homework assignments"],correct:"B",explanation:"Psychological reactance (Brehm) occurs when clients feel their freedom is threatened, leading to opposition. In MI, counselors avoid evoking reactance by not arguing or prescribing."},
{id:"h38",question:"A counselor practicing from an Adlerian perspective would MOST likely explore which of the following with a client?",options:["A) The client's cognitive distortions","B) The client's birth order and early recollections","C) The client's operant conditioning history","D) The client's attachment to the counselor"],correct:"B",explanation:"Adlerian therapy uses birth order, early recollections, family atmosphere, and lifestyle as core assessment tools to understand the client's subjective worldview."},
{id:"h39",question:"Which of the following describes the technique of paradoxical intention?",options:["A) Encouraging a client to intentionally perform a feared behavior to reduce its power","B) Asking the client to do the opposite of what they want to do","C) Instructing the client to avoid the problematic situation entirely","D) Using hypnosis to access unconscious material"],correct:"A",explanation:"Paradoxical intention (Frankl) instructs clients to intentionally perform or wish for their symptomatic behavior, which can reduce anxiety about the symptom and break the self-fulfilling cycle."},
{id:"h40",question:"A counselor asks a client: 'On a scale of 1–10, how important is it to you to make this change, and how confident are you?' This technique comes from:",options:["A) CBT","B) DBT","C) Motivational Interviewing","D) Solution-Focused Brief Therapy"],correct:"C",explanation:"Importance and confidence rulers are core MI techniques. Asking about the number and then 'why not a lower number' elicits change talk from the client."},
],
group:[
{id:"g1",question:"According to Yalom's curative factors, which refers to clients realizing they are not alone in their struggles?",options:["A) Altruism","B) Universality","C) Cohesiveness","D) Instillation of hope"],correct:"B",explanation:"Universality: group members discover that others share similar feelings and problems, reducing shame and isolation. This is one of the most powerful early-stage curative factors."},
{id:"g2",question:"During Tuckman's Storming stage, the counselor's MOST appropriate role is to:",options:["A) Provide structured activities to prevent conflict","B) Step back and allow the group to self-organize","C) Normalize conflict and help the group work through disagreements productively","D) Terminate the group if conflict becomes too intense"],correct:"C",explanation:"Storming is a normal and necessary developmental phase. The leader normalizes it, models constructive communication, and facilitates resolution."},
{id:"g3",question:"Which BEST describes scapegoating in group therapy?",options:["A) A member who assumes responsibility for group leadership","B) A group process where one member is blamed for the group's collective anxiety","C) When one member's progress inspires other members","D) The counselor taking excessive responsibility for group outcomes"],correct:"B",explanation:"Scapegoating occurs when members project collective anxiety onto a single member. The leader must intervene to protect that member and redirect the group."},
{id:"g4",question:"Altruism as a curative factor in group therapy refers to:",options:["A) The group leader providing psychoeducation","B) Members gaining self-worth by helping other group members","C) The belief that therapy will be successful","D) Learning social skills through group interaction"],correct:"B",explanation:"Altruism: members receive therapeutic benefit from helping one another, gaining a sense of value that cannot be replicated in individual therapy."},
{id:"g5",question:"A group counselor notices one member dominates while others disengage. The MOST therapeutic intervention is:",options:["A) Ask the dominant member to leave","B) Address the pattern directly with the full group to examine process dynamics","C) Only call on quiet members and ignore the dominant one","D) End the session early"],correct:"B",explanation:"Group process interventions address patterns affecting the whole group. Making the dynamic transparent invites group-level reflection and shared responsibility."},
{id:"g6",question:"Which is a characteristic of the NORMING stage in Tuckman's model?",options:["A) Group members challenge authority and test boundaries","B) The group disbands and members reflect on what was accomplished","C) Members develop cohesion, trust, and agreed-upon norms","D) The group leader structures all activities tightly"],correct:"C",explanation:"Norming = cohesion building. Members resolve earlier conflicts, establish trust, and develop shared expectations. Storming = conflict. Performing = productive therapeutic work."},
{id:"g7",question:"What is the PRIMARY advantage of group therapy over individual therapy?",options:["A) It is always less expensive and equally effective","B) It provides a social microcosm for real-time interpersonal learning","C) It is more effective for all presenting concerns","D) It requires less training from the counselor"],correct:"B",explanation:"Group therapy uniquely offers a social microcosm — a real-time interpersonal laboratory where members explore and change relationship patterns with peer support and feedback."},
{id:"g8",question:"In a counseling group, a member begins acting toward the group leader the same way they act with authority figures in their life. This is BEST described as:",options:["A) Resistance","B) Projection","C) Transference","D) Countertransference"],correct:"C",explanation:"Transference in group settings occurs when members redirect feelings and relationship patterns from past significant relationships onto the leader or other members."},
{id:"g9",question:"Which type of group focuses on teaching skills and providing information rather than personal exploration?",options:["A) Psychotherapy group","B) Process group","C) Psychoeducational group","D) Support group"],correct:"C",explanation:"Psychoeducational groups are structured and skills-focused (e.g., anger management, parenting). Counseling groups focus on interpersonal growth. Psychotherapy groups address deeper psychological issues."},
{id:"g10",question:"A group leader who shares personal reactions to the group process is demonstrating which leadership quality?",options:["A) Countertransference","B) Transparency","C) Modeling","D) Altruism"],correct:"B",explanation:"Transparency in group leadership refers to the leader's willingness to share genuine reactions to the group process when it serves a therapeutic purpose."},
{id:"g11",question:"During the initial stage of a counseling group, which leader behavior is MOST important?",options:["A) Encouraging deep emotional disclosures to build intimacy","B) Establishing safety, clarifying norms, and building trust","C) Confronting avoidance and resistance","D) Processing interpersonal conflicts among members"],correct:"B",explanation:"In the initial stage, the primary tasks are creating safety, establishing group norms, building trust, and clarifying expectations. Deep work is appropriate in later stages."},
{id:"g12",question:"A member in a grief group says 'I feel like my pain is nothing compared to what others here have been through.' This is BEST addressed by:",options:["A) Agreeing that some losses are objectively worse than others","B) Redirecting the member back to their own grief experience","C) Exploring the comparison and normalizing the experience across members","D) Suggesting the member may not be appropriate for this group"],correct:"C",explanation:"This statement reflects minimization and an opportunity for universality. The leader should explore the meaning of the comparison and help the group recognize that grief is not a competition."},
{id:"g13",question:"Which of the following is an example of a process comment in group therapy?",options:["A) 'Tell us more about what happened with your mother.'","B) 'I notice the group has gone very quiet after what James shared.'","C) 'Let us discuss the homework from last week.'","D) 'Can someone offer feedback to Maria about her situation?'"],correct:"B",explanation:"Process comments address how the group is functioning rather than the content of what is being said. Observing group dynamics in real time is a core group leadership skill."},
{id:"g14",question:"The concept of the group as a 'corrective emotional experience' suggests:",options:["A) Clients should be told how to behave correctly","B) The group provides a new relational environment that can heal past interpersonal wounds","C) Correcting members' distorted thinking in front of the group","D) Replacing old behaviors with new ones through behavioral rehearsal"],correct:"B",explanation:"The corrective emotional experience means the therapeutic relationship or group provides a safe relational context where clients can experience a healthier outcome than in past relationships."},
{id:"g15",question:"Which of the following BEST describes the concept of cohesion in group therapy?",options:["A) Agreement among members on treatment goals","B) The sense of belonging, connection, and trust among group members","C) The group's compliance with leader directives","D) Absence of conflict within the group"],correct:"B",explanation:"Cohesion is the therapeutic alliance of the group — the we-feeling, sense of belonging, and mutual caring among members. High cohesion is associated with better outcomes."},
{id:"g16",question:"A group member discloses a traumatic experience and immediately minimizes it: 'It's not a big deal, forget I said anything.' The BEST leader response is:",options:["A) Honor the member's request and move on","B) Gently hold the space open and invite the member to continue if they choose","C) Ask other members to respond immediately","D) Reassure the member that what they shared was appropriate"],correct:"B",explanation:"The leader should honor the disclosure while gently keeping the therapeutic space open without pressure. Patience and a soft invitation respect both the disclosure and the ambivalence."},
{id:"g17",question:"Which Yalom curative factor involves members learning that they can help others and that their contributions matter?",options:["A) Universality","B) Imitative behavior","C) Altruism","D) Interpersonal learning"],correct:"C",explanation:"Altruism is the experience of helping others in the group, providing the helper with a sense of value and counteracting feelings of being a burden."},
{id:"g18",question:"A counselor is running a closed group for survivors of domestic violence. A new potential member asks to join mid-group. The counselor should:",options:["A) Add the member since more perspectives enrich the group","B) Decline and refer the member to the next available group or individual services","C) Allow a trial session to see if they fit the group","D) Let the existing group members vote on whether to admit the new member"],correct:"B",explanation:"Closed groups have set membership that does not change after the group begins. Adding a new member mid-group disrupts cohesion, trust, and group development."},
{id:"g19",question:"A group member consistently monopolizes session time. Which intervention is MOST appropriate?",options:["A) Remove the member from the group for violating norms","B) Use the behavior as a group process opportunity and gently name the pattern","C) Give the member a time limit for speaking","D) Ignore the behavior to avoid shaming the member"],correct:"B",explanation:"Monopolizing behavior can be addressed therapeutically as a group process issue. The leader might say: 'I notice you've been carrying a lot of the group today — I wonder if others have reactions to share.'"},
{id:"g20",question:"In the performing (working) stage of a group, the leader's role MOST appropriately shifts to:",options:["A) More directive and structured","B) More facilitative and less central","C) More interpretive of individual psychopathology","D) More focused on group rules and norms"],correct:"B",explanation:"As groups mature, the leader appropriately steps back and becomes more facilitative, allowing members to take initiative and lead therapeutic interactions."},
{id:"g21",question:"Instillation of hope as a Yalom curative factor is MOST important in:",options:["A) The termination stage","B) The working stage","C) The early or initial stage","D) The conflict stage"],correct:"C",explanation:"Instillation of hope is particularly important in early stages when members may be demoralized. Seeing others who have made progress and believing change is possible retains members who might otherwise drop out."},
{id:"g22",question:"Which of the following BEST describes a task group?",options:["A) A group focused on personal growth and emotional healing","B) A group formed to accomplish a specific goal or complete a project","C) A group designed for clients with chronic mental illness","D) A group that teaches members specific psychological skills"],correct:"B",explanation:"Task groups (committees, planning groups, work teams) are organized around completion of a specific goal. Group dynamics principles apply, but the focus is task completion, not therapy."},
{id:"g23",question:"During a group session, two members begin arguing heatedly. The MOST appropriate leader intervention is:",options:["A) Ask the two members to leave and resolve it outside","B) Redirect the group away from the conflict to maintain safety","C) Allow the conflict to escalate to promote catharsis","D) Intervene to facilitate productive communication and use the conflict therapeutically"],correct:"D",explanation:"Conflict between members, when handled skillfully, can be highly therapeutic. The leader should facilitate direct, respectful communication and help the group process the meaning of the conflict."},
{id:"g24",question:"A counselor is screening potential members for a process group. Which factor is MOST important in determining fit?",options:["A) The potential member's diagnosis","B) The potential member's ability to give and receive feedback in an interpersonal setting","C) Whether the potential member has been in individual therapy","D) The potential member's insurance coverage"],correct:"B",explanation:"Process groups require members to engage interpersonally and tolerate feedback. The counselor should assess interpersonal functioning, capacity for self-disclosure, and relational engagement."},
{id:"g25",question:"The phenomenon in which group members adopt the behaviors or emotional expressions of other members is called:",options:["A) Projection","B) Imitative behavior","C) Universality","D) Identification"],correct:"B",explanation:"Imitative behavior (Yalom) is a curative factor in which members model and learn from the behavior of the leader and other members."},
{id:"g26",question:"A psychoeducational group for clients with anxiety disorders would be MOST appropriately led by:",options:["A) A peer volunteer with lived experience","B) A trained group facilitator with knowledge of anxiety and psychoeducational group methods","C) A psychiatrist only, due to the medical nature of anxiety","D) Any licensed professional regardless of training in groups"],correct:"B",explanation:"Psychoeducational groups require both content expertise and group facilitation skills. Specialized training in both domains is necessary for effective and ethical group leadership."},
{id:"g27",question:"Which of the following statements about confidentiality in group counseling is MOST accurate?",options:["A) All group members are legally bound to maintain confidentiality","B) The counselor can guarantee that group members will keep disclosures confidential","C) The counselor must inform members that the leader can guarantee their own confidentiality but cannot guarantee other members' behavior","D) Confidentiality only applies to the counselor, not to group members"],correct:"C",explanation:"Group confidentiality is a shared ethical expectation but cannot be legally guaranteed by the counselor. This limitation must be transparent during informed consent."},
{id:"g28",question:"A group leader who takes a non-hierarchical approach and shares leadership functions with members is practicing which leadership style?",options:["A) Authoritarian leadership","B) Democratic leadership","C) Laissez-faire leadership","D) Facilitative leadership"],correct:"B",explanation:"Democratic (collaborative) group leadership involves shared decision-making. Authoritarian leadership is directive. Laissez-faire leadership is largely hands-off and associated with poor outcomes."},
{id:"g29",question:"A group member who has made significant progress decides to share their experience with a newer member. According to Yalom, this exemplifies:",options:["A) Catharsis","B) Altruism","C) Existential factors","D) Interpersonal learning output"],correct:"B",explanation:"When a more experienced member shares knowledge or support with a newer member, this is altruism — deriving therapeutic benefit from contributing to others' growth."},
{id:"g30",question:"Which of the following is characteristic of the ADJOURNING stage in Tuckman's model?",options:["A) Members are testing group norms and leadership","B) Members are resolving interpersonal conflicts","C) Members are reflecting on the group experience and preparing for endings","D) Members are engaging in productive therapeutic work"],correct:"C",explanation:"Adjourning involves disengagement, reflection on group experiences, celebrating accomplishments, and processing the ending. Unresolved grief about termination can undo therapeutic gains."},
{id:"g31",question:"A co-leader of a group begins contradicting the other co-leader's interventions in session. The MOST appropriate response is:",options:["A) One co-leader should defer to the other to maintain group stability","B) The disagreement should be addressed privately between co-leaders after the session","C) The group should vote on which co-leader's approach to follow","D) The co-leaders should openly debate in front of the group to model conflict resolution"],correct:"B",explanation:"Co-leader conflicts should be processed privately, not in session where they can confuse or triangulate group members. Co-leaders should meet regularly for debriefing and supervision."},
{id:"g32",question:"Catharsis as a Yalom curative factor involves:",options:["A) Intellectually understanding one's problems","B) The emotional release and healing that comes from expressing suppressed feelings in a safe setting","C) Observing others model healthy behavior","D) Receiving direct feedback from group members"],correct:"B",explanation:"Catharsis in group therapy refers to the therapeutic emotional release experienced when clients express previously suppressed feelings within a safe, accepting group environment."},
{id:"g33",question:"A group member who is characteristically silent suddenly becomes tearful. The MOST appropriate leader intervention is:",options:["A) Immediately ask the member to share what they are feeling","B) Give the member space while staying present and gently checking in after a moment","C) Ask other members to comfort the member immediately","D) Move on to another topic to protect the member's privacy"],correct:"B",explanation:"The leader should honor the emotional moment without pressuring disclosure. Remaining present and making gentle contact respects the member's pace while communicating care."},
{id:"g34",question:"Which of the following BEST describes the leader's use of linking in group therapy?",options:["A) Providing members with reading materials that link to group themes","B) Connecting what one member says to the experiences of others in the group","C) Summarizing individual member progress at the end of each session","D) Linking the group content to outside homework activities"],correct:"B",explanation:"Linking is a facilitation skill in which the leader draws connections between members' experiences to build universality and cohesion."},
{id:"g35",question:"Which of the following would be an INAPPROPRIATE topic to discuss in informed consent for group counseling?",options:["A) The limits of confidentiality in a group setting","B) The names and diagnoses of all other group members","C) The group's goals and structure","D) The right to withdraw from the group"],correct:"B",explanation:"Disclosing other group members' identities or diagnoses before the group begins would violate their confidentiality. Each member can choose what to disclose about themselves."},
{id:"g36",question:"In group therapy, member-to-member feedback is MOST therapeutic when:",options:["A) It is corrective and identifies what members are doing wrong","B) It is specific, immediate, and focused on observable behavior rather than character","C) It comes from the most experienced member in the group","D) The leader frames it as advice for the member to follow"],correct:"B",explanation:"Effective interpersonal feedback is specific, based on observable behavior (not character judgments), and timely. The leader should help members develop feedback skills that are honest yet respectful."},
{id:"g37",question:"The term 'here-and-now' in group therapy refers to:",options:["A) Using cognitive techniques to address present thoughts","B) Focusing therapeutic work on what is happening among members in the room at this moment","C) Grounding techniques for managing anxiety","D) Addressing only the current week's events in member lives"],correct:"B",explanation:"The here-and-now (Yalom) is the group's interpersonal immediate experience. Focusing on what is happening between members right now leverages the group's most powerful therapeutic tool."},
{id:"g38",question:"A group member reveals at the end of a session that they are leaving the group next week without prior notice. The leader should MOST appropriately:",options:["A) Accept the member's decision without discussion","B) Encourage the member to use the remaining time to process the ending with the group","C) Ask the group to convince the member to stay","D) Immediately refer the member to individual therapy"],correct:"B",explanation:"Unplanned terminations are important clinical moments. Helping the member process their departure provides closure for both the leaving member and remaining members."},
{id:"g39",question:"Which of the following groups would be MOST appropriate to run as an open group format?",options:["A) A trauma processing group for sexual assault survivors","B) A drop-in support group for people managing chronic illness","C) A structured DBT skills group with sequential content","D) An interpersonal process group for personality disorder treatment"],correct:"B",explanation:"Open groups allow members to join and leave at any time and are appropriate for support groups without sequential content. Closed groups are better for trauma, DBT, and deep process work."},
{id:"g40",question:"A counselor running a group for adolescents in a school setting must obtain informed consent from:",options:["A) The adolescent only, since they are the direct client","B) Parents or guardians, and assent from the adolescent","C) The school administration only","D) The adolescent's teacher and parents"],correct:"B",explanation:"Minors cannot legally consent to treatment; parental/guardian consent is required. Assent (the minor's expressed willingness) is also ethically important."},
],
assessment:[
{id:"a1",question:"During a Mental Status Exam, a client is asked to interpret the proverb 'a rolling stone gathers no moss.' This assesses:",options:["A) Orientation to time and place","B) Abstract thinking","C) Immediate memory recall","D) Fund of knowledge"],correct:"B",explanation:"Proverb interpretation tests abstract thinking — the ability to move beyond literal meaning. This is a standard MSE component."},
{id:"a2",question:"A counselor is conducting a suicide risk assessment. Which factor is MOST associated with elevated lethality?",options:["A) Vague ideation with no specific plan","B) A specific plan with access to the means","C) Prior suicidal ideation with no attempt history","D) The client stating they would never act on their thoughts"],correct:"B",explanation:"The combination of a specific lethal plan and access to the means significantly elevates lethality risk. Risk assessment frameworks weight plan + means heavily."},
{id:"a3",question:"Which assessment instrument is specifically designed to measure the severity of depressive symptoms?",options:["A) MMPI-2","B) Beck Depression Inventory (BDI-II)","C) Rorschach Inkblot Test","D) Conners Rating Scale"],correct:"B",explanation:"The BDI-II specifically measures depression severity. MMPI-2 assesses broad psychopathology. Rorschach assesses personality projectively. Conners assesses ADHD symptoms."},
{id:"a4",question:"A counselor administers the same test twice within two weeks and obtains very different results. This indicates a problem with:",options:["A) Content validity","B) Construct validity","C) Test-retest reliability","D) Internal consistency"],correct:"C",explanation:"Test-retest reliability measures consistency of scores over time. Widely different scores over a short, stable interval indicate the test lacks this type of reliability."},
{id:"a5",question:"Which BEST describes the difference between a norm-referenced and a criterion-referenced test?",options:["A) Norm-referenced compare to a standard; criterion-referenced compare to peers","B) Norm-referenced compare performance to a normative group; criterion-referenced measure mastery of specific skills","C) Norm-referenced tests are more valid; criterion-referenced tests are more reliable","D) There is no practical difference between the two"],correct:"B",explanation:"Norm-referenced tests rank performance relative to a standardization sample. Criterion-referenced tests measure mastery of defined competencies such as licensure exams."},
{id:"a6",question:"Which DSM-5 diagnosis requires symptoms to be present in TWO or more settings?",options:["A) Major Depressive Disorder","B) Generalized Anxiety Disorder","C) Attention-Deficit/Hyperactivity Disorder (ADHD)","D) Borderline Personality Disorder"],correct:"C",explanation:"DSM-5 ADHD criteria (Criterion D) specifically require that symptoms be present in two or more settings and cause impairment in each."},
{id:"a7",question:"A client scores 2 standard deviations below the mean on a standardized test with a mean of 100 and SD of 15. Their score is:",options:["A) 85","B) 70","C) 65","D) 75"],correct:"B",explanation:"2 SDs below the mean: 100 - (2 × 15) = 70. A score of 70 corresponds to approximately the 2nd percentile."},
{id:"a8",question:"During intake, a client reports drinking 6-8 beers daily and becoming shaky when they do not drink. This is MOST consistent with:",options:["A) Alcohol Use Disorder with physiological dependence","B) Social drinking within normal limits","C) Alcohol abuse without dependence features","D) Stimulant Use Disorder"],correct:"A",explanation:"Daily heavy use combined with withdrawal symptoms (tremors) are hallmarks of physiological dependence. DSM-5 Alcohol Use Disorder includes tolerance and withdrawal as severity specifiers."},
{id:"a9",question:"What is the primary distinction between a screening tool and a diagnostic assessment?",options:["A) Screening tools are more accurate than diagnostic assessments","B) Screening tools identify who may need further evaluation; diagnostic assessments confirm or rule out a diagnosis","C) Diagnostic assessments are used only by psychiatrists","D) Screening tools are longer and more comprehensive"],correct:"B",explanation:"Screening tools are brief, population-level tools designed to flag individuals who may warrant further evaluation. Diagnostic assessments are comprehensive and confirm or rule out specific diagnoses."},
