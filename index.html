development:[
{id:"d1",question:"According to Erikson, the primary psychosocial challenge of adolescence is:",options:["A) Industry vs. Inferiority","B) Identity vs. Role Confusion","C) Intimacy vs. Isolation","D) Autonomy vs. Shame and Doubt"],correct:"B",explanation:"Erikson's Stage 5 (ages 12-18): Identity vs. Role Confusion. Adolescents explore who they are across domains. Stage 4 = Industry. Stage 6 = Intimacy."},
{id:"d2",question:"A 14-month-old becomes distressed when the caregiver leaves but is easily comforted upon return. This attachment style is:",options:["A) Avoidant","B) Secure","C) Disorganized","D) Anxious-ambivalent"],correct:"B",explanation:"Secure attachment: distress at separation is normal; the child is easily soothed upon reunion and uses the caregiver as a secure base for exploration."},
{id:"d3",question:"Piaget's concrete operational stage (ages 7-11) is characterized by:",options:["A) Abstract hypothetical reasoning","B) Understanding conservation and applying logical operations to concrete objects","C) Developing symbolic thinking and language","D) Achieving object permanence"],correct:"B",explanation:"Children master conservation and logical operations in the concrete operational stage. Abstract reasoning (formal operational) develops in adolescence."},
{id:"d4",question:"According to Kohlberg, a person who follows rules to avoid punishment is operating at:",options:["A) Postconventional: Social contract","B) Conventional: Law and order","C) Preconventional: Punishment and obedience","D) Conventional: Good boy/good girl orientation"],correct:"C",explanation:"Kohlberg's Preconventional Level, Stage 1: moral reasoning driven by fear of punishment. Conventional involves social conformity. Postconventional involves universal principles."},
{id:"d5",question:"Vygotsky's Zone of Proximal Development (ZPD) refers to:",options:["A) The child's current level of independent problem solving","B) The difference between what a child can do alone and what they can do with guidance","C) The stage at which a child develops theory of mind","D) The biologically determined ceiling on cognitive development"],correct:"B",explanation:"The ZPD is the space between the child's actual developmental level and their potential level with scaffolding. Learning is most productive within the ZPD."},
{id:"d6",question:"According to Maslow, which level must be substantially met before a person focuses on belonging and love needs?",options:["A) Self-actualization","B) Esteem needs","C) Safety and security needs","D) Cognitive needs"],correct:"C",explanation:"Maslow's hierarchy: Physiological → Safety → Love/Belonging → Esteem → Self-actualization. Safety needs must be largely met before belonging becomes motivating."},
{id:"d7",question:"A 72-year-old client reflects on their life with regret, feeling they wasted opportunities. According to Erikson, this person is experiencing:",options:["A) Stagnation","B) Despair","C) Role confusion","D) Isolation"],correct:"B",explanation:"Erikson's Stage 8: Integrity vs. Despair. Those who review their life with regret experience despair. Those who find meaning achieve ego integrity."},
{id:"d8",question:"Object permanence develops during which Piaget stage?",options:["A) Preoperational stage","B) Concrete operational stage","C) Sensorimotor stage","D) Formal operational stage"],correct:"C",explanation:"Object permanence is the landmark achievement of the Sensorimotor Stage (birth to ~2 years), typically emerging around 8-12 months."},
{id:"d9",question:"According to Bowlby's attachment theory, the attachment behavioral system is primarily activated by:",options:["A) Hunger and physical discomfort exclusively","B) Perceived threat or danger, triggering proximity-seeking toward attachment figures","C) The child's innate drive to explore the environment","D) Social learning through observation of peers"],correct:"B",explanation:"The attachment system evolved as a survival mechanism. Perceived threat activates attachment behaviors designed to achieve proximity to the attachment figure."},
{id:"d10",question:"Which theorist proposed that personality development continues across the entire lifespan in sequential stages?",options:["A) Sigmund Freud","B) Jean Piaget","C) Erik Erikson","D) Lawrence Kohlberg"],correct:"C",explanation:"Erikson proposed 8 psychosocial stages spanning birth through late adulthood. Freud's psychosexual stages ended at adolescence."},
{id:"d11",question:"A toddler who insists on doing everything themselves and resists caregiver help is MOST likely navigating which Erikson stage?",options:["A) Trust vs. Mistrust","B) Autonomy vs. Shame and Doubt","C) Initiative vs. Guilt","D) Industry vs. Inferiority"],correct:"B",explanation:"Erikson's Stage 2 (ages 1-3): Autonomy vs. Shame and Doubt. Toddlers develop autonomy through independence. Overly controlling caregiving leads to shame and doubt."},
{id:"d12",question:"Which of the following BEST describes Piaget's concept of accommodation?",options:["A) Fitting new information into existing schemas","B) Modifying existing schemas to incorporate new information that does not fit","C) The tendency to perceive the world from one's own perspective only","D) The process by which children imitate adult behavior"],correct:"B",explanation:"Accommodation occurs when new information requires modification of the schema. Assimilation fits new info into existing schemas. Together they drive cognitive development."},
{id:"d13",question:"Bronfenbrenner's ecological model places the most direct influence on child development in the:",options:["A) Macrosystem","B) Exosystem","C) Microsystem","D) Chronosystem"],correct:"C",explanation:"The microsystem includes settings in which the child directly participates (family, school, peer group) and has the most direct influence on development."},
{id:"d14",question:"James Marcia extended Erikson's identity theory. A person who has made a commitment without exploration is in which status?",options:["A) Identity diffusion","B) Identity moratorium","C) Identity foreclosure","D) Identity achievement"],correct:"C",explanation:"Identity Foreclosure: commitment without exploration, typically adopting parental values without questioning. Moratorium = exploration without commitment. Achievement = exploration then commitment."},
{id:"d15",question:"Which of the following BEST describes scaffolding in Vygotsky's theory?",options:["A) The permanent structure of cognitive development","B) Temporary, adjustable support provided by a more knowledgeable other within the child's ZPD","C) The cultural tools and symbols that mediate cognitive development","D) The process of internalizing external speech into private speech"],correct:"B",explanation:"Scaffolding is support calibrated to the child's ZPD, gradually withdrawn as the child achieves mastery."},
{id:"d16",question:"Kübler-Ross's stages of grief (DABDA) are:",options:["A) Denial, Anger, Bargaining, Depression, Acceptance","B) Denial, Anxiety, Bargaining, Despair, Adjustment","C) Distress, Anger, Blame, Depression, Adjustment","D) Disbelief, Anxiety, Bargaining, Depression, Acceptance"],correct:"A",explanation:"Kübler-Ross identified five stages: Denial, Anger, Bargaining, Depression, Acceptance (DABDA). These stages are not necessarily sequential or universal."},
{id:"d17",question:"A 4-year-old child who says a cloud is 'crying' when it rains is demonstrating:",options:["A) Conservation","B) Egocentrism","C) Animism","D) Object permanence"],correct:"C",explanation:"Animism is the tendency (common in the preoperational stage) to attribute life and consciousness to inanimate objects."},
{id:"d18",question:"Kohlberg's highest stage of moral development involves:",options:["A) Following rules to maintain social order","B) Acting to avoid punishment","C) Reasoning based on universal ethical principles that transcend laws","D) Behaving well to gain social approval"],correct:"C",explanation:"Kohlberg's Postconventional Level, Stage 6: moral reasoning based on universal ethical principles (justice, human dignity) that may supersede laws."},
{id:"d19",question:"Which developmental theory emphasizes the role of unconscious drives and early childhood experiences in shaping personality?",options:["A) Social learning theory","B) Attachment theory","C) Psychoanalytic theory","D) Cognitive developmental theory"],correct:"C",explanation:"Freud's psychoanalytic theory emphasizes unconscious drives (id, ego, superego), defense mechanisms, and early childhood experiences as the foundation of adult personality."},
{id:"d20",question:"According to Bandura, observational learning requires all of the following EXCEPT:",options:["A) Attention","B) Retention","C) Reinforcement of the model before observation occurs","D) Reproduction and motivation"],correct:"C",explanation:"Bandura's four processes: Attention, Retention, Reproduction, and Motivation. The model does not need to be reinforced before observation; vicarious reinforcement increases motivation."},
{id:"d21",question:"The Strange Situation paradigm was developed by:",options:["A) John Bowlby","B) Mary Ainsworth","C) Harry Harlow","D) Mary Main"],correct:"B",explanation:"Mary Ainsworth developed the Strange Situation — a structured lab procedure to assess infant attachment through separation and reunion episodes."},
{id:"d22",question:"Which of the following characterizes Erikson's stage of Generativity vs. Stagnation?",options:["A) Young adults forming intimate relationships","B) Middle-aged adults contributing to the next generation through work, parenting, or community","C) Older adults reviewing their lives for meaning","D) Adolescents forming their sense of identity"],correct:"B",explanation:"Erikson's Stage 7 (middle adulthood): Generativity involves caring for the next generation through parenting, mentoring, or creative contributions. Stagnation involves self-absorption."},
{id:"d23",question:"A child who understands that pouring water from a short, wide glass into a tall, thin glass does not change the amount has mastered:",options:["A) Object permanence","B) Egocentrism","C) Conservation","D) Centration"],correct:"C",explanation:"Conservation is the understanding that quantity remains constant despite changes in appearance. This is mastered during Piaget's concrete operational stage (ages 7-11)."},
{id:"d24",question:"Which of the following BEST describes Diana Baumrind's authoritative parenting style?",options:["A) High control, low warmth — strict discipline without emotional support","B) High control and high warmth — clear expectations combined with responsive emotional support","C) Low control, high warmth — permissive with few rules but emotionally supportive","D) Low control and low warmth — uninvolved or neglectful"],correct:"B",explanation:"Authoritative parenting combines high expectations with high warmth and responsiveness. It is associated with the best outcomes: high self-esteem, academic success, and social competence."},
{id:"d25",question:"Adolescent risk-taking is BEST explained by which neurological phenomenon?",options:["A) Full myelination of the prefrontal cortex by age 13","B) Mismatch between the mature limbic system and the still-developing prefrontal cortex","C) Elevated cortisol levels suppressing rational thought","D) Decreased dopamine sensitivity during puberty"],correct:"B",explanation:"The limbic system matures before the prefrontal cortex, creating a developmental imbalance that explains heightened risk-taking and emotional reactivity during adolescence."},
{id:"d26",question:"Which Piaget stage is characterized by egocentric thinking, symbolic play, and the beginning of language?",options:["A) Sensorimotor","B) Preoperational","C) Concrete operational","D) Formal operational"],correct:"B",explanation:"The Preoperational Stage (ages 2-7) is marked by symbolic thinking, egocentric thinking, animism, and magical thinking. Logical operations are not yet possible."},
{id:"d27",question:"A counselor working with an 85-year-old client addresses themes of meaning, regret, and legacy. This is MOST consistent with:",options:["A) Behavioral therapy","B) Erikson's Stage 8 — Ego Integrity vs. Despair","C) Piaget's Formal Operational Stage","D) Kohlberg's Postconventional Level"],correct:"B",explanation:"Erikson's final stage involves reviewing one's life for meaning, acceptance of choices made, and confronting mortality."},
{id:"d28",question:"The concept of 'goodness of fit' in child development refers to:",options:["A) Whether a child fits the norms of their peer group","B) The match between a child's temperament and their caregiving environment","C) A child's cognitive level matching the curriculum","D) The fit between a child's attachment style and parental sensitivity"],correct:"B",explanation:"Goodness of fit (Thomas & Chess) describes the match between a child's inborn temperament and the demands of their environment. Poor fit is associated with adjustment problems."},
{id:"d29",question:"Which of the following BEST describes Bowlby's concept of internal working models?",options:["A) Cognitive schemas about the reliability of attachment figures that guide future relationships","B) Biological blueprints for attachment behavior in mammals","C) The mental images children form of their parents' appearance","D) Unconscious defenses against attachment anxiety"],correct:"A",explanation:"Internal working models are cognitive-affective representations of self and attachment figures formed through early attachment experiences, serving as templates for future relationships."},
{id:"d30",question:"Carol Gilligan criticized Kohlberg's moral development theory for:",options:["A) Overemphasizing universal principles at the highest stages","B) Being based primarily on male samples and failing to capture women's ethics of care","C) Ignoring the role of religion in moral development","D) Underestimating children's moral reasoning abilities"],correct:"B",explanation:"Gilligan argued Kohlberg's theory privileged justice reasoning over care reasoning and was developed primarily on male samples. Her ethic of care emphasizes relationships and responsibility."},
{id:"d31",question:"Which of the following represents an accurate description of disorganized attachment?",options:["A) The child shows minimal distress at separation and ignores the caregiver on return","B) The child is inconsolable at separation but cannot be soothed upon reunion","C) The child shows confused, contradictory, or frightened behavior in the Strange Situation","D) The child explores freely and returns to the caregiver periodically for reassurance"],correct:"C",explanation:"Disorganized attachment (Main & Solomon) involves contradictory or disoriented behavior. It is associated with caregivers who are frightening or frightened, and with later psychopathology."},
{id:"d32",question:"According to Erikson, a child who does not successfully resolve the Initiative vs. Guilt stage may develop:",options:["A) Mistrust of others","B) An excessive sense of shame about their body","C) A pervasive sense of guilt and inhibition of initiative","D) Feelings of inferiority in academic settings"],correct:"C",explanation:"Initiative vs. Guilt (Stage 3, ages 3-6): excessive criticism of initiative leads to guilt and inhibition. Shame is Stage 2's negative outcome. Inferiority is Stage 4's negative outcome."},
{id:"d33",question:"Which of the following BEST describes the primary developmental task of young adulthood according to Erikson?",options:["A) Developing a coherent sense of identity","B) Forming deep, committed intimate relationships","C) Contributing to the next generation","D) Reviewing one's life for meaning and integrity"],correct:"B",explanation:"Erikson's Stage 6 (young adulthood): Intimacy vs. Isolation. The task is forming close, committed intimate relationships. Failure leads to isolation. Identity (Stage 5) is the prerequisite."},
{id:"d34",question:"Theory of mind, typically developing around age 4, refers to:",options:["A) The child's ability to think abstractly","B) The understanding that others have beliefs, desires, and perspectives different from one's own","C) The ability to plan and organize goal-directed behavior","D) Moral reasoning based on consequences"],correct:"B",explanation:"Theory of mind is the ability to attribute mental states to others and understand that others' beliefs may differ from reality. Deficits are a hallmark of autism spectrum disorder."},
{id:"d35",question:"Which parenting style is associated with the WORST outcomes in children?",options:["A) Authoritative","B) Authoritarian","C) Permissive","D) Uninvolved/neglectful"],correct:"D",explanation:"Uninvolved/neglectful parenting (low warmth, low control) is consistently associated with the worst outcomes: poor self-regulation, academic failure, and insecure attachment."},
{id:"d36",question:"A counselor working with a client who recently lost a spouse should be aware that:",options:["A) Grief has a predictable, universal timeline of 6-12 months","B) Grief is highly individual, and there is no single normal trajectory","C) Intense grief lasting more than 1 year always indicates complicated grief disorder","D) The client should be referred for medication if grief persists beyond 3 months"],correct:"B",explanation:"Grief is highly individualized in duration, intensity, and expression. Prolonged Grief Disorder (DSM-5-TR) requires 12 months of intense, functionally impairing grief."},
{id:"d37",question:"Bandura's concept of self-efficacy refers to:",options:["A) One's overall sense of self-worth and global self-esteem","B) One's belief in their capacity to perform specific behaviors to achieve desired outcomes","C) The degree to which a person's behavior is controlled by external reinforcement","D) A sense of autonomy and independence from social influence"],correct:"B",explanation:"Self-efficacy (Bandura) is the belief in one's capability to execute behaviors necessary to produce specific outcomes. It is domain-specific, not global self-esteem."},
{id:"d38",question:"Which of the following BEST describes an insecure-avoidant attachment pattern?",options:["A) The child is distressed when the caregiver leaves but cannot be soothed upon return","B) The child shows little distress at separation and ignores or avoids the caregiver on reunion","C) The child exhibits bizarre, disoriented behavior in the Strange Situation","D) The child uses the caregiver as a secure base for exploration"],correct:"B",explanation:"Avoidant attachment: the child appears minimally distressed and avoids the caregiver upon reunion, reflecting defensive deactivation of the attachment system."},
{id:"d39",question:"Levinson's theory of adult development is BEST known for:",options:["A) Describing psychosocial crises across the lifespan","B) Identifying alternating periods of structure building and transitional periods in adult life","C) Explaining the role of cognitive schemas in adult personality","D) Proposing that adults' moral reasoning continues to develop throughout life"],correct:"B",explanation:"Levinson proposed that adult development alternates between stable structure-building periods and transitional periods requiring re-evaluation of life structure. The midlife transition (40-45) is a key concept."},
{id:"d40",question:"A client in their 40s is questioning career choices, reevaluating relationships, and confronting mortality. This BEST reflects:",options:["A) An early-onset identity crisis","B) Midlife transition as described by Levinson or midlife generativity concerns per Erikson","C) Pathological narcissistic injury","D) Delayed adolescent development"],correct:"B",explanation:"Midlife transition (Levinson ~40-45) and Erikson's Generativity vs. Stagnation both capture the reckoning of middle adulthood. These are normative developmental processes, not pathology."},
],
vignettes:[
{id:"v1",question:"VIGNETTE: Maria, 34, reports she has not left her house in 3 weeks, is sleeping 14 hours a day, has lost 12 pounds without trying, and says 'I just do not see the point anymore.' She denies any plan to harm herself but says she feels empty. What should the counselor do FIRST?",options:["A) Begin a course of CBT to address her negative thought patterns","B) Conduct a thorough suicide risk assessment and assess for safety","C) Refer her to a psychiatrist for medication before proceeding","D) Explore her childhood to identify the root cause of her depression"],correct:"B",explanation:"Maria's presentation — hopelessness, isolation, significant neurovegetative symptoms, and passive suicidal ideation — warrants an immediate, thorough suicide risk assessment before any other intervention."},
{id:"v2",question:"VIGNETTE: A 16-year-old tells his school counselor he has been using marijuana daily for 6 months to calm anxiety and that without it he feels anxious and irritable. His grades have dropped significantly. His parents do not know. What is the counselor's MOST appropriate next step?",options:["A) Maintain confidentiality since substance use is not a mandatory reporting concern","B) Immediately call the parents without informing the client","C) Assess the situation thoroughly and consult applicable state law and school policy regarding minor confidentiality","D) Discharge the client to an outpatient substance use program without further assessment"],correct:"C",explanation:"Minor confidentiality regarding substance use is governed by state law and school policy. The counselor should assess risk level, consult guidelines, and involve the minor where clinically and legally appropriate."},
{id:"v3",question:"VIGNETTE: A counselor has been working with a client for 8 months on depression. The client has made significant progress and says 'I feel like I'm done.' The counselor believes there is still meaningful work to do. What is the MOST ethical response?",options:["A) Tell the client they are not ready and insist on continuing treatment","B) Respect the client's autonomy, discuss their perspective, review progress, and collaboratively plan termination","C) Immediately terminate without discussion to respect client wishes","D) Reduce sessions to monthly without addressing the client's request to terminate"],correct:"B",explanation:"Clients have the right to terminate at any time. The counselor should respect this autonomy while sharing their clinical perspective and ensuring an informed decision."},
{id:"v4",question:"VIGNETTE: A client mentions their previous counselor shared details about other clients and would text the client on weekends asking personal questions. The client says 'I thought that was normal.' How should the current counselor respond?",options:["A) Agree it sounds unusual but take no further action","B) Validate the client's confusion, provide psychoeducation about professional boundaries, and document the disclosure","C) Immediately file a complaint against the previous counselor on the client's behalf","D) Reassure the client that the previous counselor was just being caring"],correct:"B",explanation:"The behaviors represent serious ethical violations. The counselor should validate the client, psychoeducate about appropriate professional boundaries, and document. The counselor cannot file a board complaint on the client's behalf."},
{id:"v5",question:"VIGNETTE: James, 45, has been in counseling for anxiety. Today he seems unusually elevated: speaking rapidly, reports 3 nights of no sleep, started 4 new business ventures this week, and says he feels 'absolutely amazing.' His wife called the counselor this morning expressing concern. What should the counselor consider?",options:["A) Reinforce James's positive mood as a sign of therapeutic progress","B) Assess for a manic or hypomanic episode and consider consultation with a psychiatrist","C) Focus on completing the anxiety work since that is the presenting concern","D) Assume the behavior is situational and schedule a follow-up in 2 weeks"],correct:"B",explanation:"James presents with classic manic episode features: elevated mood, dramatically decreased need for sleep, pressured speech, grandiosity, and impulsive behavior. This requires immediate clinical assessment and likely psychiatric consultation."},
{id:"v6",question:"VIGNETTE: A counselor is working with a 10-year-old referred for behavioral problems. During play therapy, the child uses dolls to enact a scene where an adult figure repeatedly hurts a child figure and says 'this is what happens at home,' then quickly changes the subject. What is the counselor's MOST appropriate response?",options:["A) Immediately stop the session and call police","B) Gently follow the child's lead in play while assessing further; prepare to make a mandated report if abuse is suspected","C) Confront the child directly and demand they explain what they mean","D) Contact the parents first to verify before reporting"],correct:"B",explanation:"Play is the primary communication vehicle for children. The counselor should maintain the therapeutic space, follow the child's lead, and file a mandated report if reasonable suspicion of abuse is present. Contacting parents before reporting is inappropriate if they may be the abusers."},
{id:"v7",question:"VIGNETTE: A counselor receives a call from a client's employer requesting confirmation that the client is in treatment and whether they are fit for duty. The client has not provided written authorization. What should the counselor do?",options:["A) Confirm treatment to protect the client's employment","B) Deny that the client is in treatment to protect confidentiality","C) Explain that without written client authorization, no information can be confirmed or denied","D) Refer the employer to the client and discuss it in the next session"],correct:"C",explanation:"Without explicit written authorization, the counselor cannot confirm or deny the existence of a therapeutic relationship. Even acknowledging that someone is a client is a confidentiality breach."},
{id:"v8",question:"VIGNETTE: A counselor working with a domestic violence survivor feels angry at the client for returning to their abuser. The counselor finds themselves being more directive and less empathic in recent sessions. What is occurring and what should the counselor do?",options:["A) The counselor is appropriately concerned; being more directive is in the client's best interest","B) This is countertransference; the counselor should seek supervision to process their reactions and restore objectivity","C) This is a normal reaction and the counselor should continue without intervention","D) The counselor should disclose their frustration to the client to model authenticity"],correct:"B",explanation:"The counselor's anger and shift in clinical stance is countertransference interfering with therapeutic objectivity. Seeking supervision is the indicated response."},
{id:"v9",question:"VIGNETTE: A new counselor is assigned a client whose presenting concern involves severe trauma from childhood sexual abuse. The counselor has no training in trauma-informed care. What is the MOST ethical course of action?",options:["A) Proceed with general counseling techniques while learning on the job","B) Decline to take the case and refer to a trauma-specialized counselor","C) Accept the case but avoid discussing trauma to prevent retraumatization","D) Use whatever therapy the counselor knows and document uncertainty in the notes"],correct:"B",explanation:"ACA Code C.2 requires counselors to practice within their scope of competence. Trauma treatment requires specialized training. The ethical obligation is to refer the client to someone qualified."},
{id:"v10",question:"VIGNETTE: During a couples session, one partner discloses they have been having an affair and asks the counselor to keep it secret from the other partner. What should the counselor do?",options:["A) Keep the secret to maintain trust with the disclosing partner","B) Immediately disclose the affair to the other partner","C) Terminate with both partners and refer each to individual therapy","D) Clarify that secrets between partners are not kept in couples counseling and address the implications for treatment"],correct:"D",explanation:"Effective couples counseling requires a no-secrets policy. Keeping the secret creates an unethical coalition against one partner. The counselor must address whether couples therapy can continue."},
{id:"v11",question:"VIGNETTE: A counselor's client, a 28-year-old man, discloses he has been stockpiling his prescription medication 'just in case things get too bad.' He has a history of one previous suicide attempt by overdose. What is the counselor's MOST appropriate response?",options:["A) Acknowledge the disclosure and continue the session without further probing","B) Conduct an immediate, thorough suicide risk assessment and address means restriction as part of safety planning","C) Reassure the client that having a plan means he is unlikely to act on it","D) Immediately hospitalize the client without clinical assessment"],correct:"B",explanation:"Stockpiling medication in a person with a prior attempt by overdose represents a specific preparatory behavior — a high-risk indicator. Immediate risk assessment and means restriction are indicated."},
{id:"v12",question:"VIGNETTE: A counselor is working with a client who has Borderline Personality Disorder and presents frequently in crisis. The counselor feels drained and dreads the client's calls and sessions. What should the counselor do?",options:["A) Terminate the client to protect the counselor's own well-being","B) Seek supervision and consultation; consider whether the client requires a higher level of care or a different treatment approach","C) Set strict limits on all contact and document each boundary violation","D) Refer the client to a support group instead of individual therapy"],correct:"B",explanation:"The counselor's dread suggests burnout and countertransference that may compromise care. Supervision is essential. DBT is the evidence-based treatment for BPD. Abrupt termination without clinical transition planning would be unethical."},
{id:"v13",question:"VIGNETTE: A school counselor learns from a teacher that a student has been bullying others online but is also being bullied by older students. The student has not come to the counselor directly. What is the MOST appropriate initial response?",options:["A) Report the bullying student to administration for discipline immediately","B) Meet individually with the student to assess their full situation and provide support","C) Contact the student's parents without meeting with the student first","D) Ignore the situation since the student has not self-referred"],correct:"B",explanation:"The school counselor should meet with the student to assess the full picture. The student appears to be both a victim and a perpetrator — understanding the context is essential for appropriate intervention."},
{id:"v14",question:"VIGNETTE: A client who has been in counseling for panic disorder says a family member told them 'therapy is a waste of time.' The client is considering dropping out. The counselor's MOST appropriate response is:",options:["A) Criticize the family member's perspective to maintain the client's engagement","B) Explore the client's own ambivalence and beliefs about therapy without dismissing the family member","C) Provide research data on the efficacy of CBT for panic disorder","D) Suggest family therapy to address the family member's resistance"],correct:"B",explanation:"MI principles apply here: the counselor should explore the client's own thoughts and ambivalence without arguing against the family member. The client's internal motivation is more powerful than the counselor's defense of therapy."},
{id:"v15",question:"VIGNETTE: A counselor is working with an undocumented immigrant who is reluctant to pursue mental health resources due to fear of legal consequences. The counselor's MOST culturally responsive approach is:",options:["A) Assure the client that confidentiality means their immigration status will never be disclosed","B) Explore the client's specific concerns, provide accurate information about confidentiality protections, and identify culturally safe resources","C) Encourage the client to seek legal status before engaging in mental health treatment","D) Refer the client to a community organization and end the therapeutic relationship"],correct:"B",explanation:"Cultural responsiveness involves exploring the client's fears, providing accurate information about confidentiality and its limits, and collaboratively identifying accessible and culturally safe resources."},
{id:"v16",question:"VIGNETTE: A client reports that their previous therapist told them they reminded him of his daughter and would occasionally hug them at the end of sessions. The client felt the therapist 'really cared.' How should the current counselor respond?",options:["A) Agree that a caring therapist may appropriately use touch","B) Validate the client's experience of feeling cared for while gently explaining professional boundary standards and exploring any impact of these behaviors","C) Tell the client directly that the previous therapist behaved unethically","D) Report the previous therapist to the licensing board immediately"],correct:"B",explanation:"The counselor should validate the positive experience of feeling cared for while sensitively exploring the meaning and impact of the behaviors and providing psychoeducation about professional boundaries."},
{id:"v17",question:"VIGNETTE: A counselor is treating a client for depression. The client reveals they have been diagnosed with a progressive neurological condition and may lose mobility within two years. The counselor is uncertain how to respond. What is MOST appropriate?",options:["A) Immediately refer the client to a medical social worker","B) Stay present with the client's emotional experience, reflect the magnitude of the news, and collaboratively explore how this changes the focus of counseling","C) Provide the client with information about the neurological condition","D) Reassure the client that depression treatment will still be effective"],correct:"B",explanation:"When clients receive life-altering medical news, the counselor's most important role is to be present and empathically attuned. The counseling contract may need to be renegotiated to address grief and existential concerns."},
{id:"v18",question:"VIGNETTE: A counselor suspects a client is experiencing symptoms of bipolar disorder but does not have expertise in this area. The MOST ethical course of action is:",options:["A) Diagnose the disorder based on clinical observations and begin treating it","B) Consult with a supervisor or colleague and refer for psychiatric evaluation while continuing to provide supportive counseling","C) Ignore the clinical concerns since the client has not raised them","D) Terminate counseling and refer to a psychiatrist exclusively"],correct:"B",explanation:"Ethical practice requires operating within scope of competence. The counselor should seek consultation, refer for psychiatric evaluation, and continue to provide appropriate supportive care."},
{id:"v19",question:"VIGNETTE: A client in their third session says 'I feel like you're the only person who really understands me. I don't need anyone else as long as I have you.' How should the counselor respond?",options:["A) Express gratitude for the client's trust and continue building the relationship","B) Gently address the statement therapeutically, exploring its meaning and the importance of a broader support system","C) Immediately refer the client to group therapy to reduce dependency","D) Set firm limits and explain that the counselor cannot be the client's only support"],correct:"B",explanation:"This statement warrants therapeutic exploration — it may reflect isolation, idealization, or attachment patterns. The counselor should acknowledge the relationship's value while gently encouraging broader social supports."},
{id:"v20",question:"VIGNETTE: A counselor is conducting an intake session with a client who speaks limited English. An untrained family member offers to interpret. The counselor should:",options:["A) Accept the family member's help to reduce the client's discomfort","B) Use a trained professional interpreter and explain to the family member why this is important","C) Reschedule the appointment until the client brings someone who is fluent","D) Conduct the session using only body language and visual aids"],correct:"B",explanation:"Using untrained family members as interpreters poses serious clinical and ethical risks: misinterpretation, confidentiality violations, and power imbalances. Trained professional interpreters are the ethical standard."},
{id:"v21",question:"VIGNETTE: A client reports using heroin occasionally on weekends and states 'I'm not addicted. I can stop whenever I want.' Urine drug screens have been consistently positive for opioids. The counselor's MOST clinically appropriate response is:",options:["A) Accept the client's self-report as the most accurate measure of their use","B) Explore the client's perception of their use without confrontation while providing psychoeducation and assessing for DSM-5 Opioid Use Disorder criteria","C) Confront the client directly with the drug screen results and state they are clearly addicted","D) Discharge the client for dishonesty"],correct:"B",explanation:"Denial and minimization are common in substance use. The MI-consistent approach explores the discrepancy between self-report and objective data without harsh confrontation and builds motivation for change."},
{id:"v22",question:"VIGNETTE: A counselor working in a community mental health center is told by their supervisor to close active cases to meet productivity requirements, even though several clients are still in acute distress. The counselor's MOST ethical response is:",options:["A) Comply since the supervisor has authority over clinical decisions","B) Document concerns, advocate through appropriate channels, and maintain ethical standards of care while reporting the conflict to relevant oversight bodies if necessary","C) Discharge all clients immediately to comply with the directive","D) Secretly continue to see clients without billing"],correct:"B",explanation:"ACA Code D.1.g requires counselors to advocate for conditions that allow ethical service. When institutional directives conflict with client welfare, the counselor must document concerns and advocate through channels."},
{id:"v23",question:"VIGNETTE: A grief counselor's long-term client, bereaved for 18 months following the death of an adult child, continues to experience intense yearning, inability to accept the death, and significant functional impairment. The counselor should consider:",options:["A) The client needs more time and no diagnostic consideration is warranted","B) Prolonged Grief Disorder (DSM-5-TR) and referral for specialized grief-focused intervention","C) Major Depressive Disorder as the primary diagnosis","D) Referring the client to a support group and ending individual counseling"],correct:"B",explanation:"DSM-5-TR added Prolonged Grief Disorder: persistent (12+ months), intense grief with yearning, difficulty accepting the death, and functional impairment. Specialized interventions are more effective than generic grief support."},
{id:"v24",question:"VIGNETTE: A counselor notices that a client who is a person of color consistently minimizes the role of racial discrimination in their presenting difficulties. The counselor believes race is clinically relevant. The MOST appropriate response is:",options:["A) Tell the client directly that they are minimizing racism","B) Introduce the topic sensitively when clinically relevant, respecting the client's pace and readiness to explore it","C) Ignore the topic since the client has not raised it themselves","D) Refer the client to a counselor of the same racial background"],correct:"B",explanation:"Culturally responsive practice requires counselors to be willing to introduce race as a clinical topic when relevant, without imposing their perspective or moving faster than the client's readiness allows."},
{id:"v25",question:"VIGNETTE: A 19-year-old college student is brought to the counseling center by a friend. The student is disoriented, speaking incoherently, claiming strangers are sending them coded messages, and has not slept in 4 days. The counselor's IMMEDIATE priority is:",options:["A) Begin a structured CBT intake to assess for psychotic disorder","B) Assess for safety and coordinate immediate psychiatric evaluation given the severity and acute onset of symptoms","C) Conduct a standard 50-minute intake session","D) Call the student's parents for background history"],correct:"B",explanation:"This presentation is consistent with a first-break or acute psychotic episode. The immediate clinical priority is safety assessment and urgent psychiatric evaluation."},
{id:"v26",question:"VIGNETTE: A client discloses they were sexually abused by their uncle as a child and have never told anyone. They ask the counselor not to document it because they are worried about who might see it. The counselor should:",options:["A) Agree not to document since the client has requested it","B) Explain the documentation requirements, the security protections in place, and explore the client's specific concerns about privacy","C) Document every detail of the disclosure immediately without discussing it with the client","D) Refer the client to a trauma specialist before documenting anything"],correct:"B",explanation:"Counselors have professional obligations to maintain records. The counselor should explain what is documented and why, clarify how records are protected, and sensitively explore the client's fears."},
{id:"v27",question:"VIGNETTE: A counselor has been seeing a client for two years. The client's employer contacts the counselor offering to pay for additional sessions if the counselor will provide monthly progress reports. The counselor should:",options:["A) Accept the arrangement since additional funding benefits the client","B) Decline unless the client provides written informed consent for the reports, clearly understanding what will be shared","C) Accept since employer involvement reduces the client's financial burden","D) Report the employer's request to the licensing board as unethical"],correct:"B",explanation:"Third-party payers may legitimately request progress information, but only with client written authorization specifying what will be shared. Accepting without informed consent violates confidentiality."},
{id:"v28",question:"VIGNETTE: A counselor working in a rural community realizes they are the only mental health provider within 60 miles. A local elected official seeks services. The counselor should:",options:["A) Refuse to see the client due to the inherent dual relationship","B) Carefully evaluate the nature of the dual relationship, consult, and proceed with appropriate boundaries and documentation if the risk of harm is low and referral is unavailable","C) See the client and pretend not to know each other in public settings","D) See the client only for medication management, not counseling"],correct:"B",explanation:"Rural counselors frequently face unavoidable dual relationships. ACA Code A.6.e directs counselors to carefully evaluate potential harm, seek consultation, and establish clear boundaries. Access to care is a factor when referral is not feasible."},
{id:"v29",question:"VIGNETTE: A client with a trauma history reports feeling 'like the counselor is the only safe person in their world' and wants to call the counselor every day. The counselor should:",options:["A) Allow unlimited contact since the client's trauma history justifies the need","B) Explore the attachment and isolation themes therapeutically, set clear and compassionate limits on contact, and collaboratively develop a safety plan with additional resources","C) Refer the client to a higher level of care immediately","D) Terminate the therapeutic relationship to prevent dependency"],correct:"B",explanation:"Trauma survivors frequently struggle with attachment. The therapeutic response is to explore the relational pattern, establish clear contact limits, and build additional supports. Abrupt termination would be retraumatizing."},
{id:"v30",question:"VIGNETTE: A counselor receives a request from a client's attorney to provide testimony about the client's mental health status in a personal injury case. The client has signed a release. Before testifying, the counselor should:",options:["A) Provide whatever information the attorney requests since the release has been signed","B) Clarify the scope of the release, consult with legal counsel, and ensure they are operating within their scope of competence as a fact witness, not an expert witness","C) Refuse since testifying is always a dual role violation","D) Provide a written summary of all session notes without further preparation"],correct:"B",explanation:"Responding to legal requests requires careful attention to the scope of authorization and the distinction between fact witness (reporting what was observed) and expert witness (providing opinions)."},
{id:"v31",question:"VIGNETTE: A client who identifies as gay discloses that a previous counselor encouraged them to explore whether their sexual orientation could change through prayer and 'lifestyle changes.' The client is now seeking affirming care. The counselor's MOST appropriate response is:",options:["A) Remain neutral about the previous counselor's approach","B) Validate the client's experience, provide affirming care, and explain that conversion therapy practices are unethical and harmful according to major professional organizations","C) Suggest the client file a complaint against the previous counselor","D) Explore whether the client has considered the previous counselor's suggestions further"],correct:"B",explanation:"Conversion therapy is condemned by the ACA, APA, NASW, and major health organizations as harmful and unethical. The counselor should validate the client and provide affirming care."},
{id:"v32",question:"VIGNETTE: A counselor working with a couple observes that one partner consistently interrupts, dismisses, and speaks for the other. The dismissed partner rarely makes eye contact and minimizes their own needs. The counselor should:",options:["A) Ask the dominant partner to explain their perspective first in each session","B) Assess for relational power imbalances and possible coercive control, and address the dynamic therapeutically","C) Assume this is the couple's normal communication style and not intervene","D) Immediately refer the couple to a domestic violence program"],correct:"B",explanation:"The pattern described warrants assessment for coercive control. The counselor must assess safety, name the dynamic in session, and create space for the dismissed partner's voice."},
{id:"v33",question:"VIGNETTE: A counselor learns that a client has been posting detailed accounts of their therapy sessions on a public social media account. The counselor's MOST appropriate response is:",options:["A) Ask the client to delete the posts immediately","B) Explore the client's motivations and the clinical meaning of the behavior, address any accuracy concerns, and revisit informed consent expectations","C) Terminate the therapeutic relationship due to the breach","D) Ignore the posts since the client has a right to share their own experience"],correct:"B",explanation:"Clients have the right to share their own therapy experience. The behavior warrants exploration for its clinical meaning and a review of informed consent regarding social media."},
{id:"v34",question:"VIGNETTE: A 45-year-old client is referred by their physician for depression following a cancer diagnosis. The client says 'I just want to accept what is happening — I don't want to fight it.' The counselor should:",options:["A) Challenge the client's acceptance as depression-driven cognitive distortion","B) Explore the meaning of acceptance for this client without imposing a 'fighting' narrative","C) Refer to an oncologist before proceeding","D) Introduce the stages of grief model to structure the client's response"],correct:"B",explanation:"Acceptance in the face of serious illness is not inherently pathological. Imposing a 'fighter' narrative can be culturally insensitive and disrespectful of patient autonomy."},
{id:"v35",question:"VIGNETTE: A counselor is providing teletherapy when the client's environment becomes clearly unsafe — shouting and what sounds like physical altercation can be heard. The counselor should:",options:["A) End the session and call back when the situation settles","B) Immediately assess the client's safety, determine location, and follow crisis protocol including contacting emergency services if necessary","C) Maintain session as usual since the client has not disclosed danger","D) Ask the client to move to a quieter location"],correct:"B",explanation:"When safety is immediately threatened during a telehealth session, safety assessment and crisis response take absolute priority. The counselor should have the client's location on file for this reason."},
{id:"v36",question:"VIGNETTE: A counselor who specializes in eating disorders is working with a client with anorexia nervosa whose weight has dropped to a medically dangerous level. The client refuses hospitalization. The counselor should:",options:["A) Respect client autonomy and continue outpatient treatment","B) Consult with the treatment team and medical providers, assess decision-making capacity, and pursue the least restrictive intervention that ensures safety","C) Discharge the client since they are non-compliant","D) Continue weekly outpatient sessions without escalating care"],correct:"B",explanation:"Anorexia nervosa has the highest mortality rate of any psychiatric disorder. When medical danger is imminent, the counselor must consult the full treatment team and pursue escalated care."},
{id:"v37",question:"VIGNETTE: A counselor's client who has been treated for PTSD reports that since starting EMDR they have been having more intrusive memories and feels worse. The client asks to stop treatment. The counselor should:",options:["A) Continue EMDR since temporary worsening is expected and the client needs to trust the process","B) Validate the client's experience, explain the rationale for symptom fluctuation, and collaboratively assess whether to continue, modify pacing, or pause and stabilize","C) Discontinue all trauma treatment and address only current functioning","D) Refer the client to a different therapist since EMDR is not working"],correct:"B",explanation:"Symptom exacerbation during trauma processing is expected. The counselor should honor the client's response and collaboratively modify treatment pacing, such as strengthening the stabilization phase."},
{id:"v38",question:"VIGNETTE: A counselor receives a text from a client late at night stating 'I took all my pills. I don't want to wake up.' The counselor should:",options:["A) Respond by text asking the client to call them in the morning","B) Immediately call the client or emergency services and follow crisis protocol, including contacting emergency responders with the client's location if the client cannot be reached","C) Wait until morning since the text may not be genuine","D) Send a text reply with crisis hotline numbers"],correct:"B",explanation:"This communication represents a potential acute overdose and imminent threat to life. The counselor must act immediately — call the client, and if unable to reach them, contact emergency services."},
{id:"v39",question:"VIGNETTE: A client in their first session discloses they are an active member of a white supremacist group and shares views the counselor finds deeply offensive. The counselor should:",options:["A) Refuse to work with the client due to values incompatibility","B) Maintain a therapeutic stance, explore the client's presenting concerns without endorsing their ideology, and seek supervision to manage personal reactions","C) Challenge the client's ideology directly to promote social justice","D) Refer the client immediately since the counselor cannot be objective"],correct:"B",explanation:"ACA Code A.11.b cautions against referral based solely on values differences. The counselor should address clinical concerns while seeking supervision to manage countertransference."},
{id:"v40",question:"VIGNETTE: A counselor has been working with a client with severe depression for 6 months. The client calls at 2 AM saying they are sitting with a loaded gun. The counselor should:",options:["A) Tell the client to call 988 and end the call","B) Stay on the phone with the client, assess safety, and contact emergency services to respond to the client's location","C) Tell the client to put the gun away and come in for an appointment tomorrow","D) Advise the client to call a family member and call back if things get worse"],correct:"B",explanation:"This is an acute, life-threatening crisis with means (loaded gun) present. The counselor should keep the client engaged, assess safety, and dispatch emergency services immediately. Redirecting to a hotline or a tomorrow appointment abandons the client in an imminent crisis."},
],
};

// ─────────────────────────────────────────────
// CONSTANTS & CONFIG
// ─────────────────────────────────────────────
const DOMAINS = [
{id:“ethics”,      name:“Professional & Ethical Practice”,  emoji:“⚖️”,  color:”#4f9cf9”},
{id:“helping”,     name:“Helping Relationships”,             emoji:“🗣️”,  color:”#22c55e”},
{id:“group”,       name:“Group Work”,                        emoji:“👥”,  color:”#f59e0b”},
{id:“assessment”,  name:“Assessment”,                        emoji:“🔍”,  color:”#f97316”},
{id:“research”,    name:“Research & Program Evaluation”,     emoji:“📊”,  color:”#ef4444”},
{id:“development”, name:“Human Growth & Development”,        emoji:“🌱”,  color:”#a855f7”},
{id:“vignettes”,   name:“Vignettes (Case Scenarios)”,        emoji:“📋”,  color:”#06b6d4”},
];
const STRONG = 75;
const KEY = “nce_v4”;

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
function loadP(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{}}catch{return{}}}
function saveP(p){try{localStorage.setItem(KEY,JSON.stringify(p))}catch{}}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function stats(id,prog){
const h=prog[id]?.history||[];
if(!h.length)return null;
const c=h.filter(x=>x.correct).length;
return{total:h.length,correct:c,pct:Math.round(c/h.length*100)};
}
function overall(prog){
let t=0,c=0;
DOMAINS.forEach(d=>{const s=stats(d.id,prog);if(s){t+=s.total;c+=s.correct;}});
return t>0?{total:t,correct:c,pct:Math.round(c/t*100)}:null;
}
function nextQ(id,prog){
const bank=QUESTION_BANK[id];
const hist=prog[id]?.history||[];
const seen=new Set(prog[id]?.seenRound||[]);
const wrong=new Set(hist.filter(h=>!h.correct).map(h=>h.id));
const unseen=seen.size>=bank.length?bank:bank.filter(q=>!seen.has(q.id));
const wu=unseen.filter(q=>wrong.has(q.id));
const pool=wu.length>0?wu:unseen.length>0?unseen:bank;
return pool[Math.floor(Math.random()*pool.length)];
}
function barColor(pct){
if(pct===null)return”#1e293b”;
return pct>=STRONG?”#22c55e”:pct>=50?”#f59e0b”:”#ef4444”;
}

// ─────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────
let state={
screen:“home”,  // home | quiz
prog:loadP(),
domain:null,
q:null,
picked:null,
showExp:false,
sess:{correct:0,total:0},
streak:0,
};
function setState(patch){
state={…state,…patch};
render();
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function startDomain(d){
setState({screen:“quiz”,domain:d,q:nextQ(d.id,state.prog),picked:null,showExp:false,sess:{correct:0,total:0},streak:0});
}
function answer(letter){
if(state.picked)return;
const correct=letter===state.q.correct;
const np={…state.prog};
if(!np[state.domain.id])np[state.domain.id]={history:[],seenRound:[]};
const sr=[…(np[state.domain.id].seenRound||[]),state.q.id];
np[state.domain.id]={
history:[…np[state.domain.id].history,{id:state.q.id,correct}],
seenRound:sr.length>=QUESTION_BANK[state.domain.id].length?[]:sr,
};
saveP(np);
setState({
picked:letter,showExp:true,prog:np,
sess:{correct:state.sess.correct+(correct?1:0),total:state.sess.total+1},
streak:correct?state.streak+1:0,
});
}
function nextQuestion(){
setState({q:nextQ(state.domain.id,state.prog),picked:null,showExp:false});
}
function resetDomain(id){
const np={…state.prog};
delete np[id];
saveP(np);
setState({prog:np});
}

// ─────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────
function el(tag,attrs,…children){
const e=document.createElement(tag);
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k===“class”)e.className=v;
else if(k.startsWith(“on”))e.addEventListener(k.slice(2).toLowerCase(),v);
else if(k===“style”&&typeof v===“object”)Object.assign(e.style,v);
else e.setAttribute(k,v);
});
children.flat(Infinity).forEach(c=>{
if(c==null||c===false)return;
e.appendChild(typeof c===“string”||typeof c===“number”?document.createTextNode(c):c);
});
return e;
}

function statBadge(n,label,color){
return el(“div”,{style:{display:“flex”,flexDirection:“column”,alignItems:“center”,gap:“2px”}},
el(“span”,{style:{fontSize:“20px”,fontWeight:“700”,fontFamily:“monospace”,color:color||”#e2e8f0”}},n),
el(“span”,{style:{fontSize:“10px”,color:”#475569”,fontFamily:“monospace”,letterSpacing:“0.05em”}},label)
);
}

function domainCard(d,st){
const pct=st?.pct??null;
const bc=barColor(pct);
const isStrong=pct!==null&&pct>=STRONG;

const actions=el(“div”,{class:“card-actions”},
el(“button”,{class:“study-btn”,style:{background:d.color},on:{“Click”:()=>startDomain(d)}},“Study →”),
st?el(“button”,{class:“reset-btn”,on:{“Click”:(e)=>{e.stopPropagation();resetDomain(d.id);}}},“Reset”):null
);

return el(“div”,{class:“dcard”},
el(“div”,{class:“dcard-accent”,style:{background:d.color}}),
el(“div”,{class:“dcard-inner”},
el(“span”,{class:“dcard-emoji”},d.emoji),
el(“div”,{class:“dcard-name”},d.name+(isStrong?” · ✅”:””)),
el(“div”,{class:“dcard-meta”},QUESTION_BANK[d.id].length+” questions”),
st
? el(“div”,{class:“bar-row”},
el(“div”,{class:“bar-bg”},el(“div”,{class:“bar-fill”,style:{width:pct+”%”,background:bc}})),
el(“span”,{class:“bar-pct”,style:{color:bc}},pct+”%”)
)
: el(“div”,{class:“not-started”},“Not started”),
actions
)
);
}

function trackerRow(d,st){
const pct=st?.pct??null;
const bc=barColor(pct);
const status=pct===null?”—”:pct>=STRONG?“Strong”:pct>=50?“Building”:“Needs Work”;
const answered=st?.total??0;
const total=QUESTION_BANK[d.id].length;
return el(“div”,{class:“tracker-row”},
el(“span”,{class:“tracker-emoji”},d.emoji),
el(“div”,{class:“tracker-info”},
el(“div”,{class:“tracker-name”},d.name),
el(“div”,{class:“tracker-bar-row”},
el(“div”,{class:“tracker-bar-bg”},el(“div”,{class:“tracker-bar-fill”,style:{width:(pct||0)+”%”,background:bc}})),
el(“span”,{class:“tracker-pct”,style:{color:bc}},(pct||0)+”%”)
)
),
el(“div”,{class:“tracker-right”},
el(“span”,{class:“tracker-status”,style:{color:bc}},status),
el(“span”,{class:“tracker-count”},answered+”/”+total)
)
);
}

// ─────────────────────────────────────────────
// HOME SCREEN
// ─────────────────────────────────────────────
function renderHome(){
const {prog}=state;
const ov=overall(prog);
const weak=DOMAINS.filter(d=>{const s=stats(d.id,prog);return!s||s.pct<STRONG;});
const strong=DOMAINS.filter(d=>{const s=stats(d.id,prog);return s&&s.pct>=STRONG;});

const header=el(“div”,{class:“hdr”},
el(“div”,{class:“chip”},“NCE EXAM PREP”),
el(“h1”,{class:“title”},“Adreana’s Study Hub”),
el(“p”,{class:“subtitle”},“Smart rotation · Tracks weak areas · “+(Object.values(QUESTION_BANK).flat().length)+” questions”),
ov?el(“div”,{class:“ovbar”},
statBadge(ov.total,“answered”),
el(“div”,{class:“vdiv”}),
statBadge(ov.correct,“correct”,”#22c55e”),
el(“div”,{class:“vdiv”}),
statBadge(ov.pct+”%”,“overall”,”#4f9cf9”)
):null
);

const weakSection=weak.length?[
el(“div”,{class:“sec-label”},“⚠️ Focus Areas”),
el(“div”,{class:“grid”},…weak.map(d=>domainCard(d,stats(d.id,prog))))
]:[];

const strongSection=strong.length?[
el(“div”,{class:“sec-label”},“✅ Strong Areas (75%+)”),
el(“div”,{class:“grid”},…strong.map(d=>domainCard(d,stats(d.id,prog))))
]:[];

// Tracker
const tracker=el(“div”,{class:“tracker-wrap”},
el(“div”,{class:“tracker-title”},“📈 Domain Progress Tracker”),
el(“div”,{},  …DOMAINS.map(d=>trackerRow(d,stats(d.id,prog)))),
ov?el(“div”,{class:“tracker-summary”},
el(“span”,{class:“tracker-sum-label”},“Overall”),
el(“div”,{class:“tracker-bar-bg”,style:{flex:“1”}},
el(“div”,{class:“tracker-bar-fill”,style:{width:ov.pct+”%”,background:barColor(ov.pct)}})
),
el(“span”,{class:“tracker-pct”,style:{color:barColor(ov.pct)}},ov.pct+”%”),
el(“span”,{class:“tracker-count”},ov.correct+”/”+ov.total+” correct”)
):null
);

const legend=el(“div”,{class:“legend”},
…[ [”#22c55e”,“Strong (75%+)”],[”#f59e0b”,“Building (50-74%)”],[”#ef4444”,“Needs Work (<50%)”] ]
.map(([c,l])=>el(“span”,{class:“legend-item”},el(“span”,{style:{color:c}},“●”),” “+l))
);

return el(“div”,{class:“root”},
el(“div”,{class:“glow”}),
el(“div”,{class:“wrap”},
header,…weakSection,…strongSection,tracker,legend,
el(“div”,{class:“footer”},“Progress saved to your device · Wrong answers come back first · 40 questions per domain”)
)
);
}

// ─────────────────────────────────────────────
// QUIZ SCREEN
// ─────────────────────────────────────────────
function renderQuiz(){
const {domain,q,picked,showExp,sess,streak}=state;
const spct=sess.total>0?Math.round(sess.correct/sess.total*100):0;

const topBar=el(“div”,{class:“top-bar”},
el(“button”,{class:“back-btn”,on:{“Click”:()=>setState({screen:“home”,q:null,picked:null,showExp:false})}},“← Home”),
el(“span”,{class:“domain-tag”},domain.emoji+” “+domain.name),
el(“span”,{class:“session-tag”},sess.correct+”/”+sess.total+(streak>=3?” 🔥”+streak:””))
);

const progBar=sess.total>0?el(“div”,{class:“prog-bar”},
el(“div”,{class:“prog-fill”,style:{width:spct+”%”,background:domain.color}})
):null;

const options=q.options.map(opt=>{
const letter=opt[0];
const isSel=picked===letter;
const isRight=letter===q.correct;
let cls=“opt-btn”;
if(picked){if(isRight)cls+=” opt-correct”;else if(isSel)cls+=” opt-wrong”;}
const mark=picked&&isRight?el(“span”,{class:“opt-mark”,style:{color:”#4ade80”}},“✓”)
:picked&&isSel&&!isRight?el(“span”,{class:“opt-mark”,style:{color:”#f87171”}},“✗”):null;
return el(“button”,{class:cls,disabled:!!picked,on:{“Click”:()=>answer(letter)}},
el(“span”,{class:“opt-letter”},letter),
el(“span”,{class:“opt-text”},opt.slice(3)),
mark
);
});

const exp=showExp?el(“div”,{class:“exp-box”},
el(“div”,{class:“exp-hdr”},picked===q.correct?“✅ Correct!”:“❌ Incorrect — correct answer: “+q.correct),
el(“p”,{class:“exp-txt”},q.explanation),
el(“button”,{class:“next-btn”,style:{background:domain.color},on:{“Click”:nextQuestion}},“Next Question →”)
):null;

const qCard=el(“div”,{class:“q-card”},
el(“div”,{class:“q-label”},domain.id===“vignettes”?“📋 CASE VIGNETTE”:“Question”),
el(“p”,{class:“q-text”},q.question),
el(“div”,{class:“options”},…options),
exp
);

const sessStats=sess.total>=3?el(“div”,{class:“sess-stats”},
statBadge(sess.total,“this session”),
statBadge(sess.correct,“correct”,”#22c55e”),
statBadge(spct+”%”,“accuracy”,domain.color)
):null;

return el(“div”,{class:“root”},
el(“div”,{class:“glow”}),
el(“div”,{class:“wrap”},topBar,progBar,qCard,sessStats)
);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render(){
const app=document.getElementById(“app”);
app.innerHTML=””;
app.appendChild(state.screen===“home”?renderHome():renderQuiz());
}

render();
</script>

</body>
</html>
