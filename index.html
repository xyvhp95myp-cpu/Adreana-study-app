{id:"a10",question:"A client presents with flat affect, social withdrawal, disorganized speech, and auditory hallucinations lasting 8 months. Which diagnosis should be FIRST considered?",options:["A) Major Depressive Disorder with psychotic features","B) Schizophrenia","C) Brief Psychotic Disorder","D) Bipolar I Disorder with psychotic features"],correct:"B",explanation:"Schizophrenia requires at least 6 months of symptoms. The presentation over 8 months fits. Brief Psychotic Disorder lasts less than 1 month."},
{id:"a11",question:"Which of the following is an example of a projective assessment technique?",options:["A) Beck Anxiety Inventory","B) Minnesota Multiphasic Personality Inventory (MMPI-2)","C) Thematic Apperception Test (TAT)","D) Wechsler Adult Intelligence Scale (WAIS-IV)"],correct:"C",explanation:"Projective tests present ambiguous stimuli to elicit responses reflecting unconscious processes. The TAT uses ambiguous pictures. The MMPI-2 is an objective personality assessment."},
{id:"a12",question:"A counselor wants to assess a client's cognitive functioning across multiple domains. Which instrument is MOST appropriate?",options:["A) Beck Depression Inventory-II","B) Wechsler Adult Intelligence Scale (WAIS-IV)","C) Minnesota Multiphasic Personality Inventory (MMPI-2)","D) Hamilton Anxiety Rating Scale"],correct:"B",explanation:"The WAIS-IV is the gold standard for assessing adult cognitive functioning across Verbal Comprehension, Perceptual Reasoning, Working Memory, and Processing Speed."},
{id:"a13",question:"The DSM-5 replaced the multiaxial system with:",options:["A) A categorical system of five separate dimensions","B) A single diagnostic listing with notation of relevant psychosocial and contextual factors","C) A purely dimensional rating system","D) ICD-10 codes only"],correct:"B",explanation:"DSM-5 eliminated the five-axis system. Diagnoses are now listed together, with clinicians noting relevant psychosocial/environmental conditions using V/Z codes."},
{id:"a14",question:"Which of the following BEST describes content validity?",options:["A) The test measures the same construct as other established measures","B) The test scores predict future performance on a criterion","C) The test items adequately represent the full domain of the construct being measured","D) The test yields consistent scores over time"],correct:"C",explanation:"Content validity assesses whether test items adequately sample the full domain of the construct. A depression measure should cover cognitive, affective, and somatic symptoms."},
{id:"a15",question:"A score at the 84th percentile corresponds to approximately how many standard deviations above the mean?",options:["A) 0.5","B) 1","C) 1.5","D) 2"],correct:"B",explanation:"In a normal distribution, approximately 84% of scores fall below +1 SD. The 84th percentile corresponds to approximately 1 standard deviation above the mean."},
{id:"a16",question:"Which of the following symptoms is considered a NEGATIVE symptom of schizophrenia?",options:["A) Auditory hallucinations","B) Delusions of grandeur","C) Flat affect","D) Disorganized speech"],correct:"C",explanation:"Negative symptoms involve the diminution of normal functioning: flat/blunted affect, alogia, avolition, anhedonia, and asociality. Positive symptoms involve the presence of abnormal experiences."},
{id:"a17",question:"A counselor uses the PHQ-9 with a client. This is BEST described as:",options:["A) A comprehensive diagnostic interview for depression","B) A self-report screening tool for depression severity","C) A clinician-administered structured diagnostic assessment","D) A projective assessment for emotional states"],correct:"B",explanation:"The PHQ-9 is a brief, validated self-report screener for depression severity aligned with DSM criteria. It is a screening/monitoring tool, not a diagnostic instrument."},
{id:"a18",question:"Which of the following BEST describes concurrent validity?",options:["A) The test predicts future outcomes","B) The test correlates with another established measure of the same construct administered at the same time","C) The test items cover the full range of the construct","D) The test yields consistent results across different raters"],correct:"B",explanation:"Concurrent validity is established when a new measure correlates significantly with an established criterion measure administered at the same time."},
{id:"a19",question:"A GAF score of 45 in the old DSM-IV multiaxial system would indicate:",options:["A) Superior functioning","B) Mild symptoms with good functioning","C) Serious symptoms or serious impairment in social, occupational, or school functioning","D) Some difficulty but generally functioning well"],correct:"C",explanation:"GAF scores of 41-50 indicate serious symptoms (e.g., suicidal ideation, severe obsessional rituals) or serious impairment in social or occupational functioning."},
{id:"a20",question:"A counselor conducting a structured clinical interview is using:",options:["A) A projective technique","B) A standardized protocol with predetermined questions and scoring criteria","C) A qualitative interview with open-ended exploration","D) A self-report questionnaire"],correct:"B",explanation:"Structured clinical interviews (e.g., SCID-5) use standardized question sequences and explicit decision rules for diagnosis, providing greater reliability than unstructured interviews."},
{id:"a21",question:"Which of the following is TRUE about the use of assessment results with culturally diverse clients?",options:["A) Standardized tests are equally valid across all cultural groups","B) Cultural factors may affect test performance and results must be interpreted within the client's cultural context","C) Translating a test into another language ensures cultural validity","D) Using an interpreter during testing eliminates cultural bias"],correct:"B",explanation:"Tests may have limited validity with populations not represented in the normative sample. Cultural factors can affect performance. Culturally sensitive interpretation is essential."},
{id:"a22",question:"Reliability and validity have which of the following relationship?",options:["A) A valid test is always reliable","B) A reliable test is always valid","C) A test can be reliable without being valid, but cannot be valid without being reliable","D) Reliability and validity are independent and unrelated"],correct:"C",explanation:"A test must be consistent (reliable) to be accurate (valid), but consistency alone does not ensure accuracy. A test can consistently measure the wrong thing."},
{id:"a23",question:"Which of the following BEST describes the mental status exam component 'insight'?",options:["A) The client's ability to interpret proverbs","B) The client's awareness and understanding of their own mental health condition","C) The client's orientation to time, place, and person","D) The client's fund of general knowledge"],correct:"B",explanation:"Insight in the MSE refers to the client's awareness that they have a mental health problem and understanding of its nature. Poor insight is common in psychosis."},
{id:"a24",question:"A client who has immigrated from another country scores significantly lower on a verbal IQ test than on a performance IQ test. The MOST likely explanation is:",options:["A) The client has an intellectual disability","B) The discrepancy reflects language differences rather than cognitive deficits","C) Performance IQ tests are inherently less valid","D) The client is malingering"],correct:"B",explanation:"A significant VIQ-PIQ discrepancy in individuals with limited English proficiency most likely reflects language differences, not cognitive deficits."},
{id:"a25",question:"Which of the following is the PRIMARY purpose of a clinical intake assessment?",options:["A) To assign a DSM-5 diagnosis during the first session","B) To gather comprehensive information to inform treatment planning and establish a working relationship","C) To administer standardized psychological tests","D) To verify the client's insurance eligibility"],correct:"B",explanation:"The intake assessment gathers presenting concerns, history, mental status, risk factors, strengths, and contextual information to guide treatment planning."},
{id:"a26",question:"A counselor suspects a client may be minimizing alcohol use. Which assessment strategy is MOST useful?",options:["A) Confronting the client directly about suspected dishonesty","B) Using a validated alcohol screening tool such as the AUDIT alongside clinical interview","C) Relying solely on client self-report","D) Requesting a urine drug screen at every session"],correct:"B",explanation:"Validated screening tools like the AUDIT provide structured, evidence-based screening that can supplement client self-report and identify patterns the client may minimize."},
{id:"a27",question:"Which of the following is a characteristic of a reliable assessment instrument?",options:["A) It measures what it claims to measure","B) It produces consistent results across time and raters","C) It accurately predicts future behavior","D) It is free from cultural bias"],correct:"B",explanation:"Reliability refers to consistency — a reliable measure produces stable results when administered under the same conditions, scored by different raters, and across items measuring the same construct."},
{id:"a28",question:"The term 'base rate' in assessment refers to:",options:["A) The cost of administering a standardized assessment","B) The frequency with which a condition occurs in a given population","C) The average score on a standardized test","D) The minimum score required to diagnose a disorder"],correct:"B",explanation:"Base rate is the prevalence of a condition in the population being assessed. Low base-rate conditions are difficult to detect without very high test specificity."},
{id:"a29",question:"A counselor administers the Beck Anxiety Inventory and the Hamilton Anxiety Rating Scale and obtains similar scores. This demonstrates:",options:["A) Test-retest reliability","B) Internal consistency","C) Convergent validity","D) Discriminant validity"],correct:"C",explanation:"Convergent validity is demonstrated when two measures of the same construct correlate positively with each other. Similar scores on the BAI and HARS support convergent validity."},
{id:"a30",question:"Which of the following describes the clinical significance of a T-score of 70 on the MMPI-2?",options:["A) The score is within normal limits","B) The score is mildly elevated and warrants monitoring","C) The score is at or above the clinical cutoff, indicating significant elevation","D) The score indicates the client is malingering"],correct:"C",explanation:"On the MMPI-2, T-scores of 65+ are clinically elevated. A T-score of 70 is approximately 2 SDs above the normative mean — clearly in the clinical range."},
{id:"a31",question:"A counselor notices a client believes a government agency is implanting thoughts into their brain. This is BEST documented as:",options:["A) Illusion","B) Obsession","C) Delusion","D) Hallucination"],correct:"C",explanation:"A delusion is a fixed, false belief held with conviction despite contradictory evidence. Thought insertion is a Schneiderian first-rank symptom associated with schizophrenia."},
{id:"a32",question:"Which assessment approach is MOST consistent with a strengths-based framework?",options:["A) Focusing on pathological symptoms and deficits","B) Identifying client competencies, resources, and resilience alongside areas of concern","C) Using the DSM-5 to guide all assessment decisions","D) Administering only standardized norm-referenced tests"],correct:"B",explanation:"Strengths-based assessment examines client competencies, resilience, social supports, and existing coping alongside problems, informing treatment planning by building on what works."},
{id:"a33",question:"A counselor assessing a client for PTSD would look for symptoms in which four clusters?",options:["A) Intrusion, avoidance, negative cognitions/mood, arousal/reactivity","B) Hallucinations, delusions, negative symptoms, disorganization","C) Depressed mood, anhedonia, sleep disturbance, guilt","D) Panic, agoraphobia, generalized worry, social anxiety"],correct:"A",explanation:"DSM-5 PTSD has four symptom clusters: Intrusion, Persistent avoidance, Negative alterations in cognition and mood, and Alterations in arousal and reactivity."},
{id:"a34",question:"Which of the following is TRUE about the use of the DSM-5 in counseling?",options:["A) DSM-5 diagnoses are objective and free from cultural bias","B) DSM-5 is a classification system; clinical judgment is still essential for accurate diagnosis","C) A diagnosis can be made using only a brief screening instrument","D) All disorders in the DSM-5 have established biological markers"],correct:"B",explanation:"The DSM-5 provides diagnostic criteria requiring clinical judgment. Cultural and individual factors must be considered. Very few psychiatric disorders have established biomarkers."},
{id:"a35",question:"A client presents with intense fear of spiders, avoidance of areas where spiders might be, and significant occupational impairment. The MOST likely diagnosis is:",options:["A) Generalized Anxiety Disorder","B) Panic Disorder","C) Specific Phobia","D) Obsessive-Compulsive Disorder"],correct:"C",explanation:"Specific Phobia involves marked, persistent fear of a specific object or situation, avoidance or endurance with distress, and significant impairment disproportionate to actual danger."},
{id:"a36",question:"A client who survived a car accident reports intrusive memories, avoidance of driving, emotional numbing, and exaggerated startle for 10 days. The MOST appropriate diagnosis to consider is:",options:["A) PTSD","B) Acute Stress Disorder","C) Adjustment Disorder","D) Generalized Anxiety Disorder"],correct:"B",explanation:"Acute Stress Disorder presents within 3 days to 4 weeks following a traumatic event. If symptoms persist beyond 1 month, the diagnosis shifts to PTSD."},
{id:"a37",question:"Which of the following would MOST strongly suggest malingering rather than genuine symptom presentation?",options:["A) Inconsistent symptom reporting across different interviews","B) High scores on depression inventories","C) Reluctance to discuss symptoms in detail","D) Expression of distress during the interview"],correct:"A",explanation:"Malingering is suggested by inconsistent symptom reporting, symptoms that do not fit recognized patterns, and external incentives. Genuine disorders typically produce consistent presentations."},
{id:"a38",question:"A counselor assessing a child for ADHD should gather information from:",options:["A) The child only, in a structured clinical interview","B) Multiple informants including parents, teachers, and the child, across multiple settings","C) Parents only, since children are unreliable reporters","D) Medical records, since ADHD has a purely biological etiology"],correct:"B",explanation:"ADHD assessment requires multi-informant, multi-method evaluation because DSM-5 requires cross-situational impairment. Rating scales from parents and teachers, clinical interview, and academic records all contribute."},
{id:"a39",question:"Which of the following BEST defines sensitivity in the context of a diagnostic test?",options:["A) The proportion of true positives correctly identified (those with the condition who test positive)","B) The proportion of true negatives correctly identified (those without the condition who test negative)","C) The probability that a positive test result is a true positive","D) The overall accuracy of the test across all cases"],correct:"A",explanation:"Sensitivity = true positive rate. A highly sensitive test rarely misses cases. Specificity = true negative rate. Positive predictive value = probability a positive result is truly positive."},
{id:"a40",question:"A counselor documents that a client is 'oriented times three.' This means the client is oriented to:",options:["A) Time, place, and person","B) Time, place, and purpose","C) Person, place, and situation","D) Time, person, and recent events"],correct:"A",explanation:"Oriented x3 means the client correctly identifies person (who they are), place (where they are), and time (date/year/season). Disorientation may indicate organic conditions, psychosis, or intoxication."},

research:[
{id:"r1",question:"A researcher finds a correlation of +0.85 between study hours and exam scores. What does this MOST accurately mean?",options:["A) Studying more hours causes higher exam scores","B) There is a strong positive relationship between study hours and exam scores","C) 85% of students who study more get higher scores","D) The relationship is weak and unreliable"],correct:"B",explanation:"Correlation describes the strength and direction of a relationship but does NOT imply causation. +0.85 indicates a strong positive linear relationship."},
{id:"r2",question:"Which research design allows a researcher to establish cause-and-effect relationships?",options:["A) Case study","B) Correlational study","C) True experimental design with random assignment","D) Survey research"],correct:"C",explanation:"Only true experimental designs with random assignment to treatment and control conditions control for confounding variables and allow causal inferences."},
{id:"r3",question:"A counselor wants to evaluate whether a new CBT program reduces client anxiety. Which method is MOST appropriate?",options:["A) Phenomenological qualitative research","B) Pre-test/post-test comparison using a standardized anxiety measure","C) A case study of one successful client","D) Ethnographic observation of therapy sessions"],correct:"B",explanation:"Pre-test/post-test designs using standardized measures are practical for program evaluation. Adding a control group strengthens the design by ruling out alternative explanations."},
{id:"r4",question:"In a normal distribution, what percentage of scores falls within one standard deviation of the mean?",options:["A) 50%","B) 68%","C) 95%","D) 99.7%"],correct:"B",explanation:"The empirical rule: approximately 68% within ±1 SD; approximately 95% within ±2 SD; approximately 99.7% within ±3 SD."},
{id:"r5",question:"A researcher reports a p-value of .03. What does this indicate?",options:["A) There is a 3% chance the research hypothesis is true","B) There is a 3% probability of obtaining results this extreme if the null hypothesis is true","C) The effect size is small","D) The study should be rejected as unreliable"],correct:"B",explanation:"A p-value is the probability of obtaining observed results assuming the null hypothesis is true. p=.03 is statistically significant at the conventional alpha of .05."},
{id:"r6",question:"Which of the following BEST describes a Type I error in research?",options:["A) Failing to reject a false null hypothesis","B) Rejecting a true null hypothesis (false positive)","C) Using an invalid measurement instrument","D) Selecting a biased sample"],correct:"B",explanation:"Type I error = false positive: concluding an effect exists when it does not. Type II error = false negative: failing to detect a real effect."},
{id:"r7",question:"A counselor reads a study claiming a new therapy is effective because clients reported feeling better. This evidence MOST likely lacks:",options:["A) A large enough sample","B) A control group to rule out placebo effects and natural recovery","C) Statistical analysis","D) Qualitative data"],correct:"B",explanation:"Without a control group, improvements cannot be attributed to the therapy. They could reflect placebo effect, natural recovery, or passage of time."},
{id:"r8",question:"Which level of measurement allows for meaningful differences AND has a true zero point?",options:["A) Nominal","B) Ordinal","C) Interval","D) Ratio"],correct:"D",explanation:"Ratio scales have equal intervals AND a true zero, allowing meaningful ratios. Interval scales have equal intervals but no true zero (e.g., temperature in Celsius)."},
{id:"r9",question:"A researcher studying anxiety in a sample of 50 college freshmen has limited:",options:["A) Internal validity","B) External validity — generalizability to non-college or other-age populations","C) Statistical power due to excessive sample size","D) Construct validity of anxiety measures"],correct:"B",explanation:"A convenience sample of college students limits external validity. Results may not apply to older adults, non-students, or people from different backgrounds."},
{id:"r10",question:"Which of the following is an example of a qualitative research method?",options:["A) Randomized controlled trial","B) Survey with Likert-scale items","C) In-depth phenomenological interviews","D) Pre-test/post-test quasi-experimental design"],correct:"C",explanation:"Qualitative research explores lived experience and meaning through methods like interviews and focus groups. Phenomenological research examines the structure of lived experiences."},
{id:"r11",question:"A meta-analysis in counseling research is BEST described as:",options:["A) A single large-scale experimental study","B) A statistical synthesis of findings from multiple studies on the same topic","C) A qualitative study of therapist experiences","D) A longitudinal study following clients over many years"],correct:"B",explanation:"Meta-analysis uses statistical methods to combine and synthesize findings across multiple studies. It provides the highest level of evidence in the research hierarchy."},
{id:"r12",question:"The mean, median, and mode are all measures of:",options:["A) Variability","B) Central tendency","C) Correlation","D) Statistical significance"],correct:"B",explanation:"Mean (average), median (middle value), and mode (most frequent value) are all measures of central tendency. Variability is measured by range, variance, and standard deviation."},
{id:"r13",question:"A researcher randomly selects participants from a population. This is called:",options:["A) Random assignment","B) Stratified sampling","C) Random sampling","D) Convenience sampling"],correct:"C",explanation:"Random sampling selects participants randomly from the population, enhancing external validity. Random assignment distributes already-selected participants into groups, enhancing internal validity."},
{id:"r14",question:"Which research design is MOST appropriate for studying the experience of grief among widowed veterans?",options:["A) Randomized controlled trial","B) Phenomenological qualitative research","C) Survey with standardized grief measures","D) Single-case experimental design"],correct:"B",explanation:"Phenomenological research is ideal for exploring lived experience — the subjective meaning of grief. When the goal is rich description rather than causal inference, qualitative designs are appropriate."},
{id:"r15",question:"Internal validity in research refers to:",options:["A) Whether results apply to the general population","B) Whether the study measures what it claims to measure","C) The degree to which changes in the dependent variable can be attributed to the independent variable","D) Whether participants reported their experiences accurately"],correct:"C",explanation:"Internal validity refers to confidence that the independent variable caused changes in the dependent variable. It is threatened by confounds, selection bias, history effects, and attrition."},
{id:"r16",question:"An effect size of d = 0.80 in a counseling outcome study is considered:",options:["A) Small","B) Medium","C) Large","D) Not statistically significant"],correct:"C",explanation:"Cohen's conventions: small = 0.20, medium = 0.50, large = 0.80. A d of 0.80 indicates the treatment group's mean is 0.80 SDs above the control group's mean."},
{id:"r17",question:"Which of the following is a threat to internal validity?",options:["A) Using a non-representative sample","B) History effects — external events occurring during the study that affect outcomes","C) Lack of random sampling","D) Cultural differences between study participants"],correct:"B",explanation:"History effects occur when external events during the study affect the dependent variable, making it impossible to attribute change solely to the treatment."},
{id:"r18",question:"A counselor-researcher using a single-subject design. Which element is essential?",options:["A) A control group of similar participants","B) A baseline phase before the intervention is introduced","C) A sample size of at least 30","D) Random assignment of the client to conditions"],correct:"B",explanation:"Single-subject experimental designs require a baseline phase (A) to establish pre-intervention behavior before introducing the intervention (B)."},
{id:"r19",question:"In research ethics, the principle of beneficence requires that:",options:["A) Researchers treat all participants equally","B) Researchers maximize benefits and minimize risks to participants","C) Participants provide informed consent before any procedures","D) Research findings are made available to the public"],correct:"B",explanation:"The Belmont Report identifies three principles: respect for persons (autonomy), beneficence (maximize benefits, minimize harms), and justice (equitable selection)."},
{id:"r20",question:"A researcher finds that as ice cream sales increase, drowning rates also increase. The MOST likely explanation is:",options:["A) Ice cream causes drowning","B) Drowning causes people to buy ice cream","C) A third variable (summer/warm weather) causes both","D) The correlation is spurious and should be ignored"],correct:"C",explanation:"This is the third variable problem. Warm weather increases both ice cream consumption and swimming, which increases drowning risk. Correlation does not equal causation."},
{id:"r21",question:"Statistical significance at the p < .05 level means:",options:["A) There is a 95% chance the study is accurate","B) The probability of obtaining results this extreme by chance alone is less than 5%","C) The effect is large and clinically meaningful","D) The findings will replicate in 95% of similar studies"],correct:"B",explanation:"p < .05 means less than a 5% probability of obtaining results this extreme if the null hypothesis were true. Statistical significance does not indicate clinical meaningfulness."},
{id:"r22",question:"A Likert scale asking respondents to rate from 1 (strongly disagree) to 5 (strongly agree) represents which level of measurement?",options:["A) Nominal","B) Ordinal","C) Interval","D) Ratio"],correct:"B",explanation:"Likert scales are ordinal — responses have a meaningful order, but the intervals between points cannot be assumed equal. This has implications for appropriate statistical tests."},
{id:"r23",question:"Which of the following BEST describes the purpose of an Institutional Review Board (IRB)?",options:["A) To fund research projects at academic institutions","B) To review research proposals to protect the rights and welfare of human participants","C) To publish research findings in peer-reviewed journals","D) To ensure statistical methods are appropriate"],correct:"B",explanation:"IRBs review research proposals involving human subjects to ensure ethical protections: informed consent, minimal risk, confidentiality, and just participant selection."},
{id:"r24",question:"Which of the following represents the HIGHEST level of evidence in evidence-based practice?",options:["A) Expert clinical opinion","B) Single randomized controlled trial","C) Systematic review and meta-analysis of RCTs","D) Cohort study"],correct:"C",explanation:"The evidence hierarchy from lowest to highest: expert opinion → case reports → cohort studies → single RCTs → systematic reviews/meta-analyses of RCTs."},
{id:"r25",question:"A counselor using a single-case design notices the client's target behavior improves during the baseline phase before the intervention begins. This is MOST likely due to:",options:["A) The intervention taking effect early","B) Reactivity to measurement — behavior changes due to being observed","C) History effects","D) Statistical regression to the mean"],correct:"B",explanation:"Reactivity (Hawthorne effect) occurs when the act of being observed changes behavior, even before a formal intervention. This is a threat to internal validity."},
{id:"r26",question:"A researcher uses snowball sampling to recruit participants from an underground community. This method is BEST described as:",options:["A) Random sampling","B) A non-probability sampling method in which participants recruit other participants","C) A probability sampling method with known selection probabilities","D) Stratified random sampling"],correct:"B",explanation:"Snowball sampling is a non-probability method where existing participants refer others. It is useful for hard-to-reach populations but limits generalizability."},
{id:"r27",question:"A counselor reviewing research finds that a study had 80% statistical power. This means:",options:["A) 80% of participants responded to the treatment","B) There was an 80% probability of detecting a true effect if one existed","C) The study had an 80% chance of producing a Type I error","D) 80% of the variance was explained by the independent variable"],correct:"B",explanation:"Statistical power is the probability of correctly rejecting a false null hypothesis. Power of 0.80 is generally considered adequate."},
{id:"r28",question:"Which of the following BEST describes a quasi-experimental design?",options:["A) A study with random assignment to conditions","B) A study that manipulates an independent variable but lacks random assignment","C) A qualitative study using interviews and observation","D) A study that measures variables without any manipulation"],correct:"B",explanation:"Quasi-experimental designs manipulate an independent variable and compare groups, but lack random assignment. They have better internal validity than correlational designs but weaker than true experiments."},
{id:"r29",question:"Triangulation in qualitative research refers to:",options:["A) Using three research participants to improve reliability","B) Using multiple data sources, methods, or researchers to enhance trustworthiness of findings","C) A geometric approach to sampling","D) Combining three different statistical tests"],correct:"B",explanation:"Triangulation increases trustworthiness in qualitative research by using multiple sources, methods, or researchers to corroborate findings from different angles."},
{id:"r30",question:"A researcher wants to understand how counselors develop professional identity over their careers. Which design is MOST appropriate?",options:["A) Randomized controlled trial","B) Grounded theory qualitative research","C) Single-subject experimental design","D) Survey with Likert-scale items"],correct:"B",explanation:"Grounded theory is appropriate for developing theory from data about processes and experiences. It uses systematic data collection and analysis to generate theory grounded in participant experiences."},
{id:"r31",question:"A study reports r = .30, p < .05. A counselor should conclude:",options:["A) There is a strong, clinically significant relationship","B) There is a statistically significant but weak relationship; clinical significance should be separately evaluated","C) The result is not meaningful because the correlation is low","D) The result confirms a causal relationship"],correct:"B",explanation:"r = .30 is a weak-to-moderate correlation. Statistical significance indicates the relationship is unlikely due to chance but does not indicate large effect or clinical importance."},
{id:"r32",question:"Which of the following is a characteristic of action research?",options:["A) Pure knowledge generation without practical application","B) Collaborative, practitioner-led research aimed at improving practice in a specific setting","C) Random assignment to conditions to test causal hypotheses","D) Large-scale national surveys of counseling outcomes"],correct:"B",explanation:"Action research is practitioner-based inquiry aimed at solving specific problems and improving practice. It is collaborative, cyclical (plan-act-observe-reflect), and applied."},
{id:"r33",question:"When a counselor evaluates a program by measuring outcomes at the individual client level, this is called:",options:["A) Needs assessment","B) Formative evaluation","C) Outcome evaluation","D) Process evaluation"],correct:"C",explanation:"Outcome evaluation measures the results of a program — did it achieve its intended effects? Process evaluation examines program implementation. Formative evaluation is conducted during development."},
{id:"r34",question:"A study with N = 500 finds a statistically significant correlation of r = .10. A counselor should interpret this as:",options:["A) A practically significant finding that should change clinical practice","B) A statistically significant but very weak relationship with minimal practical importance","C) Evidence of a causal relationship","D) An error, since small correlations cannot be significant with large samples"],correct:"B",explanation:"With large samples, even trivially small effect sizes achieve statistical significance. r = .10 is a small effect regardless of sample size. Statistical significance must be evaluated alongside effect size."},
{id:"r35",question:"Which ethical issue is MOST specific to qualitative research?",options:["A) Ensuring adequate statistical power","B) Maintaining participant anonymity when rich personal narratives are reported","C) Obtaining FDA approval for psychological interventions","D) Using double-blind procedures"],correct:"B",explanation:"Qualitative research involves rich narrative data that can inadvertently identify participants even when names are changed. Anonymity protections require special attention in qualitative reporting."},
{id:"r36",question:"A counselor wants to determine whether a school-wide conflict resolution program should be expanded. Which type of evaluation is MOST appropriate?",options:["A) Needs assessment","B) Process evaluation","C) Summative evaluation","D) Cost-effectiveness analysis"],correct:"C",explanation:"Summative evaluation assesses whether a program achieved its goals after completion, informing decisions about continuation or expansion."},
{id:"r37",question:"What does it mean when a research finding is described as 'clinically significant'?",options:["A) The finding reached the p < .05 threshold","B) The change in the client's functioning is large enough to be meaningful in their daily life","C) The finding was published in a peer-reviewed clinical journal","D) The study had adequate statistical power"],correct:"B",explanation:"Clinical significance refers to whether a statistically significant change is large enough to matter in real life — whether the client has moved from the dysfunctional to the functional range."},
{id:"r38",question:"In a counseling study, the dependent variable is BEST defined as:",options:["A) The treatment or intervention being tested","B) The outcome measured to assess the effect of the treatment","C) The characteristic used to randomly assign participants","D) The variable that is held constant throughout the study"],correct:"B",explanation:"The dependent variable (DV) is what is measured — the outcome. The independent variable (IV) is what is manipulated (e.g., type of therapy)."},
{id:"r39",question:"A counselor-researcher using grounded theory conducts multiple interviews until no new themes emerge. This process is called:",options:["A) Purposive sampling","B) Theoretical saturation","C) Data triangulation","D) Member checking"],correct:"B",explanation:"Theoretical saturation occurs when continued data collection produces no new conceptual categories. It signals the emerging theory is sufficiently developed and is a marker of rigor in grounded theory."},
{id:"r40",question:"A counselor reads two studies on the same intervention: one shows large effects with N=30, and another shows small effects with N=300. Which finding should be weighted MORE heavily?",options:["A) The N=30 study because large effects are more meaningful","B) The N=300 study because larger samples produce more stable effect estimates","C) Neither, since the findings conflict and cancel out","D) The most recently published study"],correct:"B",explanation:"Larger samples produce more stable, reliable effect estimates with smaller confidence intervals. Small-sample studies are prone to overestimating effects."},
